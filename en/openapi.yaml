      summary: Update invoice
      operationId: updateInvoice
      description: |-
        Updates an existing invoice.

        ### How updates work

        - Update uses the same payload contract and the same defaults as the create flow.
        - You must send either `clientId` or the `client` object.
        - `items` are always required.
        - If you omit a field, the backend does not preserve the current value from the invoice. Instead, it resolves the field exactly like in the create flow from the payload, client defaults, and company document settings.
        - When updating line items, you may send the original `uuid` values of existing invoice rows. These UUIDs are available in the invoice detail response. The backend uses them to keep warehouse outbound receipt links stable when allocations or quantities change. In the create flow you do not send these UUIDs; the backend generates them.

        ### Error semantics

        - `422` when you explicitly send a `clientId` that does not exist or is outside the token scope.
        - `422` when you explicitly send a `bankAccountId` that does not exist or is outside the token scope.
        - `422` when the payload fails business validation, for example because the invoice items are invalid.
