    WebhookSubscription:
      description: One webhook subscription for the current company.
      type: object
      properties:
        id:
          description: Internal webhook subscription ID.
          type: integer
          example: 801
        companyId:
          description: ID of the company that owns the subscription.
          type: integer
          example: 15
        name:
          description: Optional internal subscription name used for your own orientation.
          type: [string, 'null']
          maxLength: 255
          example: ERP sync
        url:
          description: HTTPS URL where Fintoro delivers webhook requests. The hostname must point to a public IP address; `localhost`, `.local`, private ranges, and reserved addresses are rejected by the backend.
          type: string
          format: uri
          maxLength: 2048
          example: https://example.com/webhooks/fintoro
        isActive:
          description: When `true`, the subscription is active and can receive delivery requests.
          type: boolean
          example: true
        subscribedEvents:
          description: List of event types delivered for this subscription.
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
          example:
            - invoices.created
            - invoices.updated
        lastSuccessAt:
          description: ISO 8601 time of the last successful delivery, when one exists.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:04:05Z'
        lastFailureAt:
          description: ISO 8601 time of the last failed delivery, when one exists.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:05:42Z'
        disabledAt:
          description: ISO 8601 time when the subscription was disabled. In this API version it remains `null` unless you disable the subscription manually or a future version adds auto-disable flows.
          type: [string, 'null']
          format: date-time
          example: null
        disabledReason:
          description: Reason why the subscription was disabled, when available.
          type: [string, 'null']
          example: null
        createdAt:
          description: ISO 8601 time when the subscription was created.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T14:59:12Z'
        updatedAt:
          description: ISO 8601 time of the last subscription change.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:01:33Z'
    WebhookSubscriptionWithSecret:
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          properties:
            plainTextSecret:
              description: Plaintext signing secret returned only during create or rotate-secret. Store it securely; it is not returned again by later responses.
              type: string
              example: whsec_fintoro_8b5d7c9f4f6549f7a3e8c4fd5f55ab91
    WebhookSubscriptionInput:
      description: Payload used to create or update a webhook subscription. Use only an HTTPS endpoint that can accept JSON `POST` requests from Fintoro and whose hostname resolves to a public IP address.
      type: object
      required:
        - url
        - isActive
        - subscribedEvents
      properties:
        name:
          description: Optional internal subscription name that makes the subscription easier to identify in Fintoro or inside your integration team.
          type: [string, 'null']
          maxLength: 255
          example: ERP sync
        url:
          description: HTTPS URL of your webhook receiver. The backend rejects insecure `http://` addresses, endpoints with embedded username or password, and hosts that resolve to `localhost`, `.local`, private, loopback, link-local, or other reserved IP addresses. The same validation runs again immediately before the webhook is sent.
          type: string
          format: uri
          maxLength: 2048
          example: https://example.com/webhooks/fintoro
        isActive:
          description: Controls whether the subscription is active immediately after it is saved.
          type: boolean
          example: true
        subscribedEvents:
          description: List of event types that Fintoro should deliver to this endpoint. The array must contain at least one event.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WebhookEventType'
          example:
            - invoices.created
            - invoices.updated
    Country:
      description: Country available in Fintoro API lookup endpoints and in nested objects where the country is returned directly in the response.
      type: object
      properties:
        id:
          description: Stable country ID used across the API.
          type: integer
          example: 703
        name:
          description: Localized country label. When you send `Accept-Language`, the backend translates this system-owned label accordingly.
          type: string
          example: Slovakia
        code:
          description: Two-letter ISO country code.
          type: string
          example: SK
        eu:
          description: Indicates whether the country is part of the European Union.
          type: boolean
          example: true
    Language:
      description: Language available in Fintoro API lookup endpoints.
      type: object
      properties:
        id:
          description: Stable language ID used across the API.
          type: integer
          example: 1
        name:
          description: Localized language label. When you send `Accept-Language`, the backend translates this system-owned label accordingly.
          type: string
          example: Slovak
        code:
          description: Short language code.
          type: string
          example: sk
    Currency:
      description: Currency available in Fintoro API lookup endpoints.
      type: object
      properties:
        id:
          description: Stable currency ID used across the API.
          type: integer
          example: 1
        symbol:
          description: ISO or internal currency symbol.
          type: string
          example: EUR
        name:
          description: Localized currency label. When you send `Accept-Language`, the backend translates this system-owned label accordingly.
          type: string
          example: Euro
        mark:
          description: Short currency mark displayed in Fintoro.
          type: string
          example: €
    DeliveryMethod:
      description: Delivery method available in Fintoro API lookup endpoints.
      type: object
      properties:
        id:
          description: Stable delivery method ID used across the API.
          type: integer
          example: 1
        name:
          description: Localized delivery-method label. When you send `Accept-Language`, the backend translates this system-owned label accordingly.
          type: string
          example: Unspecified
    PaymentMethod:
      description: Payment method available in Fintoro API lookup endpoints.
      type: object
      properties:
        id:
          description: Stable payment method ID used across the API.
          type: integer
          example: 1
        name:
          description: Localized payment-method label. When you send `Accept-Language`, the backend translates this system-owned label accordingly.
          type: string
          example: Bank transfer
    DocumentPayment:
      description: One payment of a public document.
      type: object
      properties:
        id:
          description: Internal payment ID.
          type: integer
          example: 801
        documentType:
          description: Type of the document this payment belongs to.
          type: string
          enum: [invoice, proforma, credit-note]
          example: invoice
        documentId:
          description: ID of the document this payment belongs to.
          type: integer
          example: 301
        paymentMethod:
          description: Used payment method as a nested lookup object.
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          description: Payment currency as a nested lookup object.
          $ref: '#/components/schemas/Currency'
        paymentDate:
          description: Payment date in `Y-m-d` format.
          type: string
          format: date
          example: '2026-03-07'
        amount:
          description: Payment amount in the payment currency.
          type: number
          format: float
          example: 15.5
        currencyRate:
          description: Exchange rate of the payment currency against EUR. If the payment currency is `EUR`, the backend always returns `1.0`.
          type: number
          format: float
          example: 1.0
        receiptInvoice:
          description: Preview of the linked payment receipt invoice, when it exists.
          anyOf:
            - $ref: '#/components/schemas/InvoicePreview'
            - type: 'null'
    DocumentPaymentInput:
      description: >-
        Payload used to create a document payment. Only `invoice`, `proforma`, and `credit-note` documents are supported, and the target
        document must be available in the token scope.
      type: object
      required:
        - documentType
        - documentId
      properties:
        documentType:
          description: Type of the document you are paying.
          type: string
          enum: [invoice, proforma, credit-note]
          example: invoice
        documentId:
          description: ID of the document you are paying.
          type: integer
          example: 301
        currencyId:
          description: "Optional currency ID from the [currency reference table](/en/reference-tables#currencies). If omitted, the source document currency is used."
          type: integer
          example: 1
        currencyRate:
          description: Exchange rate of the payment currency against EUR. If omitted, the system derives it from the final `paymentDate` using the previous day's rate. If provided for a currency other than `EUR`, the override value is used as-is. If the final payment currency is `EUR`, the backend always stores `1.0`.
          type: number
          format: float
          example: 1.0
        paymentDate:
          description: Payment date in `Y-m-d` format. If omitted, today's date is used.
          type: string
          format: date
          example: '2026-03-07'
        paymentMethodId:
          description: "Optional payment method ID from the [payment method reference table](/en/reference-tables#payment-methods). If omitted, the source document payment method is used."
          type: integer
          example: 1
        amount:
          description: Payment amount in the payment currency. If omitted, the current remaining `toBePaid` amount from the source document is used. The backend also accepts negative amounts, for example when settling a credit note.
          type: number
          format: float
          example: 15.5
    DocumentMailInput:
      description: >-
        Payload used to send a supported document by email. The target document is selected through `documentType` + `documentId`
        and must be available in the token scope.
      type: object
      required:
        - documentType
        - documentId
        - to
        - type
      properties:
        documentType:
          description: Document type you want to send by email.
          type: string
          enum: [invoice, proforma, order, credit-note, quotation]
          example: invoice
        documentId:
          description: ID of a supported document.
          type: integer
          example: 301
        to:
          description: Array of one or more target email addresses.
          type: array
          minItems: 1
          items:
            type: string
            format: email
            example: billing@example.test
          example:
            - billing@example.test
            - owner@example.test
        body:
          description: Optional custom text inserted into the email body.
          type: [string, 'null']
          maxLength: 1000
          example: Please find the document attached.
        type:
          description: >-
            Mail type. For `invoice` and `proforma`, it changes the subject and template type; for `order`, `credit-note`,
            and `quotation`, it currently behaves the same as `regular`.
          type: string
          enum: [regular, reminder, overdue_reminder, confirmation]
          example: reminder
    QrType:
