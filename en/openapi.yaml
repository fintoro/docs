          example: 1
        preferredPaymentMethodId:
          type: [integer, 'null']
          description: "Default payment method for the client. It is stored on the client and used as a fallback default when creating new documents for this client if you do not send an explicit value in the payload. The value comes from the [payment method reference table](/en/reference-tables#payment-methods)."
          example: 1
        preferredCurrencyId:
          type: [integer, 'null']
          description: "Default currency for the client. It is stored on the client and used as a fallback default when creating new documents for this client if you do not send an explicit value in the payload. The value comes from the [currency reference table](/en/reference-tables#currencies)."
          example: 1
        preferredLanguageId:
          type: [integer, 'null']
          description: "Default language for the client. It is stored on the client and used as a fallback default when creating new documents for this client if you do not send an explicit value in the payload. The value comes from the [language reference table](/en/reference-tables#languages)."
          example: 1
        preferredDueDays:
          description: Default due days. It is stored on the client and used as a fallback default when creating new documents for this client if you do not send an explicit value in the payload.
          type: [integer, 'null']
          minimum: 0
          maximum: 365
