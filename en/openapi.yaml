          description: Supplier business ID when available.
          type: [string, 'null']
          maxLength: 40
          example: '12345678'
        taxId:
          description: Supplier tax ID when available.
          type: [string, 'null']
          maxLength: 40
          example: '2020123456'
        vatId:
          description: Supplier VAT ID when available.
          type: [string, 'null']
          maxLength: 40
          example: SK2020123456
        isVatPayer:
          description: Whether the supplier is a VAT payer. If omitted, the backend infers it from `vatId`.
          type: boolean
          example: true
        email:
          description: Supplier contact email.
          type: [string, 'null']
          format: email
          maxLength: 255
          example: billing@supply.test
        street:
