          example: '12345678'
        taxId:
          description: Client tax ID, when available.
          type: [string, 'null']
          example: '2020123456'
        vatId:
          description: Client VAT ID, when available.
          type: [string, 'null']
          example: SK2020123456
        isVatPayer:
          description: Indicates whether the client is currently recorded as a VAT payer.
          type: boolean
          example: true
        email:
          description: Client contact email.
          type: [string, 'null']
          example: billing@acme.test
        street:
          description: Street and number of the billing address.
          type: [string, 'null']
          example: Main Street 1
        city:
          description: City of the billing address.
          type: [string, 'null']
          example: Bratislava
        zip:
