openapi: 3.1.0
info:
  title: Fintoro API v1
  version: "1.0.0"
  description: |
    Fintoro API v1 is a REST API for integrating Fintoro invoicing, CRM, and warehouse workflows into third-party systems.

    Production and sandbox companies use the same base URL `https://app.fintoro.sk/api/public/v1`. The bearer token decides which company you work with.

    The optional `Accept-Language` request header localizes system-owned labels in lookups, in related response objects, and in validation errors. The `Content-Language` response header returns the language used in the response.

    For onboarding and operational guidance, also see:
    - [Getting started](/en/getting-started)
    - [Authentication](/en/authentication)
    - [Webhooks](/en/webhooks)
    - [Sandbox testing](/en/sandbox-testing)
    - [API conventions](/en/conventions)
    - [Errors and idempotency](/en/errors-and-idempotency)
servers:
  - url: https://app.fintoro.sk/api/public/v1
    description: Production Fintoro API.
security:
  - bearerAuth: []
x-tagGroups:
  - name: Integration basics
    tags:
      - Token identity
      - Lookups
      - Numerical Series
      - Subjects
      - Clients
      - Suppliers
      - Bank Accounts
  - name: Webhooks
    tags:
      - Webhooks
  - name: CRM
    tags:
      - Business Case Statuses
      - Business Cases
      - CRM Events
  - name: Warehouses and catalog
    tags:
      - Warehouses
      - Warehouse Inbound Receipts
      - Warehouse Outbound Receipts
      - Price List Items
  - name: Documents
    tags:
      - Invoices
      - Credit Notes
      - Proformas
      - Orders
      - Quotations
      - Document Payments
      - Document Emails
tags:
  - name: Token identity
    description: Technical read-only endpoint that confirms which company the current bearer token belongs to.
  - name: Lookups
    description: Read-only lookup endpoints for integration data. These endpoints return lookup datasets with stable IDs that are safe to cache on your side. When new lookup values are added, existing IDs do not change or get reassigned.
  - name: Numerical Series
    description: Read-only endpoints for numerical series. They return the live configuration used when creating documents, including the next generated document number and variable symbol.
  - name: Subjects
    description: Look up and verify subject details before creating a client.
  - name: Clients
    description: Manage clients, including billing address, delivery address, and client-scoped default values that can be reused when building payloads for new documents. Create, update, and delete operations can emit `clients.created`, `clients.updated`, and `clients.deleted` webhook events.
  - name: Suppliers
    description: Manage suppliers, including billing address and identifier data used by the warehouse inbound resolve-or-create flow. Create, update, and delete operations can emit `suppliers.created`, `suppliers.updated`, and `suppliers.deleted` webhook events.
  - name: Business Case Statuses
    description: Manage business-case statuses. Statuses represent pipeline columns. In this API version, a reorder endpoint is not available; when a status is deleted, linked business cases are detached to `null`. Create, update, and delete operations can emit `business-case-statuses.created`, `business-case-statuses.updated`, and `business-case-statuses.deleted` webhook events.
  - name: Business Cases
    description: Manage business cases, including the nested client or supplier and an optional status. Reorder flows and changing the linked contact through update are not available in this API version. Create, update, and delete operations can emit `business-cases.created`, `business-cases.updated`, and `business-cases.deleted` webhook events.
  - name: CRM Events
    description: Manage CRM events for `note`, `email`, `phone_call`, and `document_linked`. Attachments use a separate two-step upload endpoint. Create, update, and delete operations can emit `contact-activity-logs.created`, `contact-activity-logs.updated`, and `contact-activity-logs.deleted` webhook events.
  - name: Bank Accounts
    description: Manage bank accounts, including bank details, primary account state, and open banking metadata. Create, update, and delete operations can emit `bank-accounts.created`, `bank-accounts.updated`, and `bank-accounts.deleted` webhook events.
  - name: Webhooks
    description: Manage outbound webhook subscriptions for Fintoro API. This section covers subscription CRUD, manual secret rotation, and the delivery payload contract for event-driven integrations. The delivery contract, signature verification, retry behavior, and full event catalog are documented in the [Webhooks guide](/en/webhooks).
  - name: Warehouses
    description: CRUD operations for warehouses, including inbound and outbound numbering series. Create, update, and delete operations can emit `warehouses.created`, `warehouses.updated`, and `warehouses.deleted` webhook events.
  - name: Warehouse Inbound Receipts
    description: CRUD operations for warehouse inbound receipts, including warehouse detail, supplier snapshot, receipt items, and `pdfDownloadUrl`. Create, update, and delete operations can emit `warehouse-inbound-receipts.created`, `warehouse-inbound-receipts.updated`, and `warehouse-inbound-receipts.deleted` webhook events.
  - name: Warehouse Outbound Receipts
    description: CRUD operations for warehouse outbound receipts, including warehouse detail, client snapshot, receipt items, and `pdfDownloadUrl`. Create and update use the same stock-availability validation as the web. Create, update, and delete operations can emit `warehouse-outbound-receipts.created`, `warehouse-outbound-receipts.updated`, and `warehouse-outbound-receipts.deleted` webhook events.
  - name: Price List Items
    description: >-
      CRUD operations for price list and warehouse items. These endpoints return the unit as a nested object,
      support filtering by name, EAN, warehouse code, price, and stock, and expose the same business contract that Fintoro uses for
      warehouse tracking, EANs, and purchase prices. Create, update, and delete operations can emit `price-list-items.created`,
      `price-list-items.updated`, and `price-list-items.deleted` webhook events.
  - name: Document Payments
    description: >-
      Payment records for public documents. This section covers listing payments of one document, creating a new
      payment, showing one payment, and deleting it. Supported document types are `invoice`, `proforma`, `credit-note`,
      `received-invoice`, and `received-receipt`. Create and delete operations can emit `document-payments.created`
      and `document-payments.deleted` webhook events. When a newly recorded payment makes a supported document fully paid,
      Fintoro can also emit the matching `*.paid` event for that document resource.
  - name: Document Emails
    description: >-
      Send supported public documents by email. The endpoint uses a single contract around
      `documentType` + `documentId`, validates document ownership, and supports `invoice`, `proforma`, `order`,
      `credit-note`, and `quotation`.
  - name: Invoices
    description: CRUD operations for invoices. Create, update, and delete operations can emit `invoices.created`, `invoices.updated`, and `invoices.deleted` webhook events. When a recorded payment makes the invoice fully paid, Fintoro can also emit `invoices.paid`.
  - name: Credit Notes
    description: >-
      CRUD operations for credit notes. The contract uses camelCase payloads, a full `PUT` update flow, and an
      explicit link to the original invoice through `invoiceId`. The credit-note client is always derived from the selected source invoice;
      `clientId` is not part of the request contract, and inline client resolution or create behavior is not supported here. Create,
      update, and delete operations can emit `credit-notes.created`, `credit-notes.updated`, and `credit-notes.deleted` webhook events.
      When a recorded payment makes the credit note fully paid, Fintoro can also emit `credit-notes.paid`.
  - name: Proformas
    description: >-
      CRUD operations for proformas. The contract follows the same philosophy as the public invoice API:
      camelCase payloads, deterministic client resolve/create behavior, create-like defaults, and a full `PUT` update flow with no
      patch fallback to the previous persisted document state. Create, update, and delete operations can emit `proformas.created`,
      `proformas.updated`, `proformas.deleted`, and, when a recorded payment makes the document fully paid, `proformas.paid`.
  - name: Orders
    description: >-
      CRUD operations for orders. The contract uses camelCase payloads, deterministic client resolve/create
      behavior, create-like defaults, and a full `PUT` update flow with no patch fallback to the previous persisted document state.
      Create, update, and delete operations can emit `orders.created`, `orders.updated`, and `orders.deleted` webhook events.
  - name: Quotations
    description: >-
      CRUD operations for quotations. The contract uses camelCase payloads, deterministic client
      resolve/create behavior, create-like defaults, and a full `PUT` update flow with no patch fallback to the previous persisted
      document state. Create, update, and delete operations can emit `quotations.created`, `quotations.updated`, and
      `quotations.deleted` webhook events.
paths:
  /whoami:
    get:
      tags: [Token identity]
      summary: Current company identity
      operationId: showWhoami
      description: Returns the minimal identity of the company assigned to the bearer token. Use this endpoint to quickly confirm that your integration is operating against the expected production or sandbox company without fetching additional business data.
      responses:
        '200':
          description: Identity of the current company.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Whoami'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /banks:
    get:
      tags: [Lookups]
      summary: List banks
      operationId: listBanks
      description: Returns the list of banks you can use when creating or updating a bank account. The endpoint does not support filtering or pagination and returns the full lookup dataset. Treat banks as a stable lookup; new records may be added over time, while existing IDs remain preserved for compatibility with stored bank accounts.
      responses:
        '200':
          description: Bank list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full current list of banks available for bank accounts.
                    type: array
                    items:
                      $ref: '#/components/schemas/Bank'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /countries:
    get:
      tags: [Lookups]
      summary: List countries
      operationId: listCountries
      description: Returns the fixed country lookup. The endpoint does not support filtering or pagination and returns the full dataset. Country IDs are stable within this API version and are also listed in the [country reference table](/en/reference-tables#countries). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Country list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of countries available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/Country'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /languages:
    get:
      tags: [Lookups]
      summary: List languages
      operationId: listLanguages
      description: Returns the fixed language lookup. The endpoint does not support filtering or pagination and returns the full dataset. Language IDs are stable within this API version and are also listed in the [language reference table](/en/reference-tables#languages). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Language list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of languages available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/Language'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /currencies:
    get:
      tags: [Lookups]
      summary: List currencies
      operationId: listCurrencies
      description: Returns the fixed currency lookup. The endpoint does not support filtering or pagination and returns the full dataset. Currency IDs are stable within this API version and are also listed in the [currency reference table](/en/reference-tables#currencies). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Currency list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of currencies available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/Currency'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /delivery-methods:
    get:
      tags: [Lookups]
      summary: List delivery methods
      operationId: listDeliveryMethods
      description: Returns the fixed delivery-method lookup. The endpoint does not support filtering or pagination and returns the full dataset. Delivery-method IDs are stable within this API version and are also listed in the [delivery method reference table](/en/reference-tables#delivery-methods). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Delivery method list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of delivery methods available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/DeliveryMethod'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /payment-methods:
    get:
      tags: [Lookups]
      summary: List payment methods
      operationId: listPaymentMethods
      description: Returns the fixed payment-method lookup. The endpoint does not support filtering or pagination and returns the full dataset. Payment-method IDs are stable within this API version and are also listed in the [payment method reference table](/en/reference-tables#payment-methods). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Payment method list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of payment methods available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /qr-types:
    get:
      tags: [Lookups]
      summary: List QR types
      operationId: listQrTypes
      description: Returns the fixed QR-type lookup. The endpoint does not support filtering or pagination and returns the full dataset. QR-type IDs are stable within this API version and are also listed in the [QR type reference table](/en/reference-tables#qr-types). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: QR type list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of QR types available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/QrType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /units:
    get:
      tags: [Lookups]
      summary: List units
      operationId: listUnits
      description: Returns the fixed unit lookup. The endpoint does not support filtering or pagination and returns the full dataset. Unit IDs are stable within this API version and are also listed in the [unit reference table](/en/reference-tables#units). Labels can be localized through `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Unit list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of units available in this API version.
                    type: array
                    items:
                      $ref: '#/components/schemas/Unit'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /numerical-series:
    get:
      tags: [Numerical Series]
      summary: List numerical series
      operationId: listNumericalSeries
      description: Returns the numerical series used for creating public documents. The endpoint does not paginate; it returns the full relevant dataset for the supported document type provided in the required `documentType` query parameter. Supported values are `invoice`, `proforma`, `credit-note`, `order`, and `quotation`. In addition to the internal counter `nextNumber`, the response also includes `nextDocumentNumber` and `nextVariableSymbol`, so an integrator can see in advance which document number and variable symbol would be generated from a given series.
      parameters:
        - in: query
          name: documentType
          required: true
          description: Required document type for which the relevant numerical series dataset should be returned.
          schema:
            type: string
            enum: [invoice, proforma, credit-note, order, quotation]
          example: invoice
      responses:
        '200':
          description: Numerical series list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Full list of numerical series for the requested document type.
                    type: array
                    items:
                      $ref: '#/components/schemas/NumericalSeries'
        '422':
          description: The query parameter failed validation rules.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /numerical-series/{numericalSeries}:
    parameters:
      - $ref: '#/components/parameters/NumericalSeriesId'
    get:
      tags: [Numerical Series]
      summary: Show numerical series
      operationId: showNumericalSeries
      description: Returns the detail of one numerical series in the same shape as the list endpoint. This is useful when you want to store a concrete `numericalSeriesId` and later verify or reload it before creating a document.
      responses:
        '200':
          description: Numerical series detail.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericalSeries'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /subjects:
    get:
      tags: [Subjects]
      summary: Search subjects
      operationId: searchSubjects
      description: Use this endpoint when you want to prefill company or freelancer details by name or business ID.
      parameters:
        - name: searchQuery
          in: query
          required: true
          description: Search string. This can be a company name or a business ID. Minimum length is 3 characters.
          schema:
            type: string
            minLength: 3
            example: acme
        - name: legalForm
          in: query
          required: false
          description: Optional legal form filter if you want to narrow the results to companies or freelancers only.
          schema:
            type: string
            enum: [freelancer, company]
            example: company
        - name: limit
          in: query
          required: false
          description: Maximum number of results returned by the endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 20
            example: 5
      responses:
        '200':
          description: Returns matching subjects from the reference registry.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: List of matching subjects.
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /subjects/{subject}:
    parameters:
      - $ref: '#/components/parameters/SubjectId'
    get:
      tags: [Subjects]
      summary: Show subject
      operationId: showSubject
      description: Returns a single subject from the reference registry by its ID.
      responses:
        '200':
          description: Returns the requested subject.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /clients:
    get:
      tags: [Clients]
      summary: List clients
      operationId: listClients
      description: Returns clients. This endpoint is suitable for syncing clients into an external system or custom frontend and supports basic full-text search, filtering, and sorting.
      parameters:
        - name: search
          in: query
          required: false
          description: Full-text search by name, city, ZIP code, or country.
          schema:
            type: string
            example: bratislava
        - name: sortBy
          in: query
          required: false
          description: Field used to sort clients.
          schema:
            type: string
            enum: [name, city, zip, countryId, createdAt, updatedAt]
            example: name
            default: name
        - name: sortDirection
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
            example: desc
            default: asc
        - name: type
          in: query
          required: false
          description: Filter by client type.
          schema:
            type: string
            enum: [person, company]
            example: company
        - name: subjectId
          in: query
          required: false
          description: Filter by the client's or company's business ID.
          schema:
            type: string
            example: '12345678'
        - name: taxId
          in: query
          required: false
          description: Filter by the client's or company's tax ID.
          schema:
            type: string
            example: '2020123456'
        - name: vatId
          in: query
          required: false
          description: Filter by the client's or company's VAT ID.
          schema:
            type: string
            example: SK2020123456
        - name: countryId
          in: query
          required: false
          description: "Filter by the client's billing country from the [country reference table](/en/reference-tables#countries)."
          schema:
            type: integer
            example: 703
      responses:
        '200':
          description: Client list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: List of clients.
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags: [Clients]
      summary: Create client
      operationId: createClient
      description: Creates a new client. The request contains the client's business data and optional client-scoped default values that you can later reuse when building payloads for new documents. If you send an `Idempotency-Key`, the same key with the same payload returns the original response without creating the client again.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreateInput'
      responses:
        '201':
          description: Client created.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
              description: The original idempotency key when it was provided in the request.
              schema:
                type: string
            Idempotency-Status:
              description: '`Original` for the first processed request or `Repeated` when the original response is replayed.'
              schema:
                type: string
                enum: [Original, Repeated]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '422':
          description: The idempotency key was reused with a different payload.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Idempotency-Key reused with different request payload
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /clients/{client}:
