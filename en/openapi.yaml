    WarehouseReceiptLineInput:
      description: One line item of a warehouse inbound or outbound receipt create or update payload.
      type: object
      required: [priceListItemId, quantity, unitPrice, vatRate]
      properties:
        priceListItemId:
          description: ID of a warehouse-enabled warehouse or price list item.
          type: integer
          example: 701
        quantity:
          description: Item quantity. Minimum value is `0.00001`.
          type: number
          format: float
          minimum: 0.00001
          maximum: 10000000000000
          example: 3
        unitPrice:
          description: Unit price excluding VAT.
          type: number
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 15
        vatRate:
          description: VAT rate on the line item in percent.
          type: number
          format: float
          minimum: 0
          maximum: 100
          example: 20
    PriceListItem:
      description: >-
        Price list or warehouse item. The object returns business fields that can be reused when
        creating documents, plus warehouse-specific settings when stock tracking is enabled for the item.
      type: object
      properties:
        id:
          description: Internal item ID in Fintoro.
          type: integer
          example: 701
        name:
          description: Item name.
          type: string
          example: Service package
        description:
          description: Detailed item description when it is stored on the item.
          type: [string, 'null']
          example: Monthly service and support
        unitId:
          description: "Unit ID from the [unit reference table](/en/reference-tables#units)."
          type: integer
          example: 1
        unit:
          description: Item unit as a nested lookup object.
          $ref: '#/components/schemas/Unit'
        unitPrice:
          description: Selling unit price excluding VAT.
          type: number
          format: float
          example: 129.9
        vatRate:
          description: VAT rate used for the selling price of the item.
          type: number
          format: float
          example: 20
        unitPriceWithVat:
          description: Selling unit price including VAT, calculated by the backend.
          type: number
          format: float
          example: 155.88
        stock:
          description: Current total stock quantity across all warehouses.
          type: number
          format: float
          example: 12
        ean:
          description: Item EAN when it is tracked.
          type: [string, 'null']
          maxLength: 255
          example: '8586012345678'
        useWarehouse:
          description: Indicates whether warehouse tracking is enabled for the item.
          type: boolean
          example: true
        warehouseCode:
          description: Internal warehouse card code. When warehouse tracking is enabled, it should be unique within the token scope.
          type: [string, 'null']
          maxLength: 255
          example: SKU-PUBLIC-001
        enableNegativeStock:
          description: Indicates whether the item allows negative stock.
          type: boolean
          example: false
        maxStock:
          description: Recommended maximum stock level when it is configured on the item.
          type: [number, 'null']
          format: float
          example: 250
        purchasePrice:
          description: Purchase price excluding VAT when it is stored on the item.
          type: [number, 'null']
          format: float
          example: 89.5
        purchaseVatRate:
          description: Purchase VAT rate when it is stored on the item.
          type: [number, 'null']
          format: float
          example: 20
        purchasePriceWithVat:
          description: Purchase price including VAT calculated by the backend when purchase price and VAT rate are available.
          type: [number, 'null']
          format: float
          example: 107.4
    PriceListItemCreateInput:
      description: >-
        Payload for creating a price list or warehouse item. The required business fields are always `name`, `unitPrice`, `unitId`,
        and `vatRate`. When you send `useWarehouse: true`, `warehouseCode` becomes required.
      type: object
      required: [name, unitPrice, unitId, vatRate]
      properties:
        name:
          description: Item name.
          type: string
          maxLength: 255
          example: Service package
        description:
          description: Optional detailed item description.
          type: [string, 'null']
          maxLength: 1000
          example: Monthly service and support
        unitPrice:
          description: Selling unit price excluding VAT.
          type: number
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 129.9
        unitId:
          description: "Unit ID from the [unit reference table](/en/reference-tables#units)."
          type: integer
          example: 1
        vatRate:
          description: Selling VAT rate of the item.
          type: number
          format: float
          minimum: 0
          maximum: 23
          example: 20
        ean:
          description: Optional EAN of the item. When provided, it must be unique within the token scope.
          type: [string, 'null']
          maxLength: 255
          example: '8586012345678'
        useWarehouse:
          description: When `true`, the item is treated as a warehouse-tracked item.
          type: boolean
          default: false
          example: true
        warehouseCode:
          description: >-
            Optional warehouse card code. When you send `useWarehouse: true`, this field is required and must be unique within the token scope.
          type: [string, 'null']
          maxLength: 255
          example: SKU-PUBLIC-001
        enableNegativeStock:
          description: Indicates whether negative stock is allowed.
          type: boolean
          default: false
          example: false
        maxStock:
          description: Optional recommended maximum stock level.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 10000000000000
          example: 250
        purchasePrice:
          description: Optional purchase price excluding VAT.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 89.5
        purchaseVatRate:
          description: Optional purchase VAT rate.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 23
          example: 20
    PriceListItemUpdateInput:
      description: >-
        Payload for updating a price list or warehouse item. The Fintoro API uses a full `PUT` contract, so the required fields are
        the same as for create and omitted fields do not mean "keep the current persisted value".
      allOf:
        - $ref: '#/components/schemas/PriceListItemCreateInput'
    InvoiceItem:
      description: Single invoice line item.
      type: object
      properties:
        id:
          type: integer
          example: 1
        uuid:
          description: UUID of the invoice row. You receive this identifier in the invoice detail response and may send it back during update if you need warehouse allocations and outbound receipt links to stay attached to the same logical row.
          type: string
          format: uuid
          example: 6b1b8c9e-66e6-4fb5-b2db-6d7c7f0f8f19
        name:
          type: string
          example: Consulting
        description:
          type: [string, 'null']
          example: Monthly consulting package
        unitPrice:
          type: number
          format: float
          example: 100.0
        unitId:
          type: integer
          description: "Unit ID from the [unit reference table](/en/reference-tables#units)."
          example: 1
        quantity:
          type: number
          format: float
          example: 2.0
        vatRate:
          type: number
          format: float
          example: 20.0
        discountName:
          type: [string, 'null']
          example: Loyalty discount
        discountType:
          type: [string, 'null']
          example: percentage
        discountValue:
          type: [number, 'null']
          format: float
          example: 10.0
        priceListItemId:
          type: [integer, 'null']
          example: 501
        total:
          type: number
          format: float
          example: 200.0
        totalWithVat:
          type: number
          format: float
          example: 240.0
    InvoiceWarehouseAllocation:
      type: object
      required: [warehouseId, quantity]
      properties:
        warehouseId:
          type: integer
          example: 1
        quantity:
          type: number
          format: float
          minimum: 0.00001
          maximum: 1000000
          example: 2.0
    InvoiceItemInput:
      description: >-
        Payload for a single invoice line item. Three modes are supported: a manual item, `priceListItemId + quantity`, or
        `priceListItemId` with sparse override fields. `quantity` is always required. If you omit `priceListItemId`, you must also send
        `name`, `unitId`, `unitPrice`, and `vatRate`. If you send `priceListItemId`, the backend can hydrate the name, unit,
        unit price, and VAT rate from the price list item, and the payload acts only as a sparse override.
      type: object
      required: [quantity]
      anyOf:
        - required: [priceListItemId]
        - required: [name, unitId, unitPrice, vatRate]
      properties:
        name:
          description: Item name. Required for manual items. When `priceListItemId` is used, it may override the name hydrated from the price list item.
          type: [string, 'null']
          maxLength: 255
          example: Consulting
        description:
          description: Optional item description. With `priceListItemId`, it may override or supplement the description coming from the price list item.
          type: [string, 'null']
          maxLength: 1000
          example: Monthly consulting package
        unitPrice:
          description: Unit price without VAT. Required for manual items. When `priceListItemId` is used, it may override the price hydrated from the price list item.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 100.0
        unitId:
          description: "Unit ID from the [unit reference table](/en/reference-tables#units). Required for manual items. When `priceListItemId` is used, it may override the unit from the price list item."
          type: [integer, 'null']
          example: 1
        quantity:
          description: Item quantity. This field is always required, regardless of whether the item is manual or hydrated from the price list.
          type: number
          format: float
          minimum: 0.00001
          maximum: 1000000
          example: 2.0
        vatRate:
          description: VAT rate in percent. Required for manual items. When `priceListItemId` is used, it may override the VAT rate from the price list item.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 23
          example: 20.0
        discountType:
          description: Item-level discount type. Allowed values are `percentage` and `fixed`.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Item-level discount value. If you send `discountType`, you must also send this field.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 10.0
        discountName:
          description: Item-level discount label. If omitted while `discountType` and `discountValue` are provided, the backend fills in a localized `Discount` based on the document language.
          type: [string, 'null']
          maxLength: 255
          example: Loyalty discount
        uuid:
          description: Optional item UUID. In the public create flow you do not send it; the backend generates it after the line item is stored.
          type: [string, 'null']
          format: uuid
          example: 6b1b8c9e-66e6-4fb5-b2db-6d7c7f0f8f19
        priceListItemId:
          description: Price list item ID. When provided, the backend can hydrate the item name, unit, unit price, and VAT rate from the linked price list item, and the payload can stay sparse.
          type: [integer, 'null']
          example: 501
        warehouseAllocations:
          description: Optional per-warehouse quantity allocations. Use them only for items that are linked to stock cards and require explicit warehouse movement allocation.
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/InvoiceWarehouseAllocation'
    CompanySnapshot:
      description: Supplier snapshot stored directly on the document. This object represents the company details exactly as they existed when the document was issued or last re-saved, so the original supplier name, identifiers, and address remain preserved on the document.
      type: object
      properties:
        name:
          description: Supplier company name stored on the invoice.
          type: string
          example: Fintoro s.r.o.
        subjectId:
          description: Supplier business ID stored on the invoice.
          type: string
          example: '12345678'
        legalForm:
          description: Supplier legal form stored on the invoice.
          type: string
          example: Limited liability company
        taxId:
          description: Supplier tax ID stored on the invoice when it was available.
          type: [string, 'null']
          example: '2020123456'
        vatId:
          description: Supplier VAT ID stored on the invoice when it was available.
          type: [string, 'null']
          example: SK2020123456
        vatPayerTypeId:
          description: Supplier VAT payer type stored on the invoice.
          type: integer
          example: 4
        country:
          description: Supplier country stored on the invoice as a plain text value.
          type: string
          example: Slovakia
        city:
          description: Supplier city stored on the invoice.
          type: string
          example: Bratislava
        street:
          description: Supplier street and house number stored on the invoice.
          type: string
          example: Main Street 1
        zip:
          description: Supplier ZIP or postal code stored on the invoice.
          type: [string, 'null']
          example: '81101'
        logo:
          description: URL or path to the logo stored in the snapshot, when it was available.
          type: [string, 'null']
          example: https://cdn.fintoro.sk/company/logo.svg
        signature:
          description: URL or path to the signature stored in the snapshot, when it was available.
          type: [string, 'null']
          example: https://cdn.fintoro.sk/company/signature.png
        registrationCourt:
          description: Supplier registration court stored on the invoice, when it was available.
          type: [string, 'null']
          example: City Court Bratislava III
        registrationNumber:
          description: Supplier registration number stored on the invoice, when it was available.
          type: [string, 'null']
          example: 12345/B
        email:
          description: Supplier contact email stored on the invoice.
          type: [string, 'null']
          example: support@fintoro.sk
        phone:
          description: Supplier contact phone stored on the invoice.
          type: [string, 'null']
          example: '+421900000000'
        web:
          description: Supplier website stored on the invoice.
          type: [string, 'null']
          example: https://fintoro.sk
    ClientSnapshot:
      description: >-
        Historical client snapshot stored directly on the document. This object represents the client data exactly as it existed when the document was issued or last re-saved. If the client changes later, for example the name or billing address, the document keeps this historical value for auditability and long-term data persistence. Example: a document issued to `Main Street 1, Bratislava` remains historically correct even if the client profile now contains a different billing address.
      type: object
      properties:
        name:
          description: Person name or company name stored on the invoice at that moment in time.
          type: string
          example: Acme s.r.o.
        type:
          description: Client type stored on the invoice.
          type: string
          example: company
        subjectId:
          type: [string, 'null']
          description: "Business ID of the client or company. For Slovak entities, you can typically also find this value through the [subject registry lookup](#operation/searchSubjects)."
          example: '12345678'
        taxId:
          description: Tax ID stored on the invoice when it was available.
          type: [string, 'null']
          example: '2020123456'
        vatId:
          description: VAT ID stored on the invoice when it was available.
          type: [string, 'null']
          example: SK2020123456
        isVatPayer:
          description: Indicates whether the client was marked as a VAT payer when this snapshot was stored.
          type: boolean
          example: true
        email:
          description: Client contact email stored on the invoice.
          type: [string, 'null']
          example: billing@acme.test
        street:
          description: Billing street and house number stored on the invoice.
          type: [string, 'null']
          example: Main Street 1
        city:
          description: Billing city stored on the invoice.
          type: [string, 'null']
          example: Bratislava
        zip:
          description: Billing ZIP or postal code stored on the invoice.
          type: [string, 'null']
          example: '81101'
        countryId:
          type: [integer, 'null']
          description: "Country ID from the [country reference table](/en/reference-tables#countries)."
          example: 703
        country:
          description: Billing country stored on the invoice as a nested object.
          anyOf:
            - $ref: '#/components/schemas/Country'
            - type: 'null'
        hasDeliveryAddress:
          description: Indicates whether this snapshot contains a separate delivery address.
          type: boolean
          example: true
        deliveryStreet:
          description: Delivery street and house number stored on the invoice.
          type: [string, 'null']
          example: Warehouse 9
        deliveryCity:
          description: Delivery city stored on the invoice.
          type: [string, 'null']
          example: Kosice
        deliveryZip:
          description: Delivery ZIP or postal code stored on the invoice.
          type: [string, 'null']
          example: '04001'
        deliveryCountryId:
          type: [integer, 'null']
          description: "Country ID from the [country reference table](/en/reference-tables#countries)."
          example: 703
        deliveryCountry:
          description: Delivery country stored on the invoice as a nested object.
          anyOf:
            - $ref: '#/components/schemas/Country'
            - type: 'null'
    InvoiceBankAccountReference:
      description: Bank account linked to the invoice as a live relation. The invoice still loads this account through soft delete, so the detail remains available even after the account is removed from the active bank account list.
      type: object
      properties:
        id:
          description: Internal bank account ID in Fintoro.
          type: integer
          example: 201
        bankId:
          description: "Bank ID from the [banks lookup endpoint](#operation/listBanks)."
          type: [integer, 'null']
          example: 1
        bank:
          description: Nested bank object linked to the bank account, when it is known.
          anyOf:
            - $ref: '#/components/schemas/Bank'
            - type: 'null'
        name:
          description: Bank account name in the current database state.
          type: string
          example: Main account
        iban:
          description: IBAN of the linked bank account.
          type: string
          example: SK3111000000001234567890
        swift:
          description: SWIFT or BIC code of the linked bank account.
          type: string
          example: TATRSKBX
        isPrimary:
          description: Indicates whether the account is currently marked as the company's primary bank account.
          type: boolean
          example: true
        autoPaymentMatching:
          description: Indicates whether the account is currently connected to automatic payment matching through open banking.
          type: boolean
          example: true
    InvoicePreviewClient:
      description: Historical client snapshot embedded directly in a document preview response. The live client ID is exposed separately through `clientId`.
      allOf:
        - $ref: '#/components/schemas/ClientSnapshot'
    PaginatorLink:
      description: Single paginator link entry.
      type: object
      properties:
        url:
          description: Target page URL or `null` when the link is not available.
