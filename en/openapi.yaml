      properties:
        type:
          description: Supplier type. If omitted, the backend infers it from identifier fields.
          type: string
          enum: [person, company]
          example: company
        name:
          description: Supplier trade name or personal name.
          type: string
          maxLength: 255
          example: Supplier s.r.o.
        subjectId:
          description: Supplier business ID when available.
          type: [string, 'null']
          maxLength: 40
          example: '12345678'
        taxId:
          description: Supplier tax ID when available.
          type: [string, 'null']
          maxLength: 40
          example: '2020123456'
        vatId:
          description: Supplier VAT ID when available.
          type: [string, 'null']
          maxLength: 40
          example: SK2020123456
        isVatPayer:
          description: Whether the supplier is a VAT payer. If omitted, the backend infers it from `vatId`.
          type: boolean
          example: true
        email:
          description: Supplier contact email.
          type: [string, 'null']
          format: email
          maxLength: 255
          example: billing@supplier.test
        street:
          description: Supplier billing street and number.
          type: [string, 'null']
          maxLength: 255
          example: Supplier Street 1
        city:
          description: Supplier billing city.
          type: [string, 'null']
          maxLength: 255
          example: Bratislava
        zip:
          description: Supplier ZIP or postal code.
          type: [string, 'null']
          maxLength: 10
          example: '81101'
        countryId:
          description: "Billing country ID from the [country reference table](/en/reference-tables#countries)."
          type: [integer, 'null']
          example: 703
    BusinessCaseStatus:
      description: Business-case status. Represents one pipeline column.
      type: object
      properties:
        id:
          description: Internal business-case status ID.
          type: integer
          example: 41
        name:
          description: Business-case status name.
          type: string
          example: Negotiation
        color:
          description: Status color in hex format.
          type: string
          maxLength: 7
          example: '#22aa44'
    BusinessCaseStatusInput:
      description: Payload used to create or update a business-case status.
      type: object
      required: [name, color]
      properties:
        name:
          description: Business-case status name.
          type: string
          maxLength: 255
          example: Negotiation
        color:
          description: Status color in hex format.
          type: string
          maxLength: 7
          example: '#22aa44'
    BusinessCase:
      description: Business case, including the nested client or supplier and an optional status.
      type: object
      properties:
        id:
          description: Internal business-case ID in Fintoro.
          type: integer
          example: 501
        contactType:
          description: Type of linked contact. `client` means a client, `supplier` means a supplier.
          type: string
          enum: [client, supplier]
          example: client
        contactId:
          description: Internal ID of the linked contact matching `contactType`.
          type: integer
          example: 101
        client:
          description: Nested client object when the business case is linked to a client.
          anyOf:
            - $ref: '#/components/schemas/Client'
            - type: 'null'
        supplier:
          description: Nested supplier object when the business case is linked to a supplier.
          anyOf:
            - $ref: '#/components/schemas/Supplier'
            - type: 'null'
        name:
          description: Business-case name.
          type: string
          example: Client pipeline
        description:
          description: Optional business-case description.
          type: [string, 'null']
          example: Opportunity description
        status:
          description: Current business-case status as a nested object. May be `null` when the case is not assigned to any status.
          anyOf:
            - $ref: '#/components/schemas/BusinessCaseStatus'
            - type: 'null'
        boardPosition:
          description: Internal position of the business case within its current status or in the no-status column.
          type: integer
          example: 2
        createdAt:
          description: Business-case creation timestamp.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:00:00+01:00'
        updatedAt:
          description: Business-case last update timestamp.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:30:00+01:00'
    BusinessCaseCreateInput:
      description: Payload used to create a business case. You must send exactly one of `clientId` or `supplierId`.
      type: object
      required: [name]
      properties:
        clientId:
          description: ID of a client. Mutually exclusive with `supplierId`.
          type: [integer, 'null']
          example: 101
        supplierId:
          description: ID of a supplier. Mutually exclusive with `clientId`.
          type: [integer, 'null']
          example: 151
        statusId:
          description: ID of a business-case status. The field may also be `null`.
          type: [integer, 'null']
          example: 41
        name:
          description: Business-case name.
          type: string
          maxLength: 255
          example: Client pipeline
        description:
          description: Optional business-case description.
          type: [string, 'null']
          example: Opportunity description
    BusinessCaseUpdateInput:
      description: Payload used to update a business case. Send only the fields you want to change. `clientId` and `supplierId` are not allowed during update.
      type: object
      properties:
        statusId:
          description: ID of a business-case status. The field may also be `null`.
          type: [integer, 'null']
          example: 41
        name:
          description: Business-case name.
          type: string
          maxLength: 255
          example: Updated business case
        description:
          description: Optional business-case description.
          type: [string, 'null']
          example: Updated description
    ContactActivityLogAttachmentUpload:
      description: Temporary upload token for a CRM event attachment. Send `uploadToken` later in `attachmentUploadTokens[]` when creating or updating the CRM event.
      type: object
      properties:
        uploadToken:
          description: Opaque token representing one uploaded attachment.
          type: string
          example: eyJpdiI6Ik9wYXF1ZS1Ub2tlbiIsInZhbHVlIjoiLi4uIn0=
        fileName:
          description: Original uploaded file name.
          type: string
          example: note.pdf
        mimeType:
          description: Detected MIME type of the uploaded file.
          type: string
          example: application/pdf
        size:
          description: File size in bytes.
          type: integer
          example: 12288
    ContactActivityLogAttachment:
      description: One attachment linked to a CRM event.
      type: object
      properties:
        id:
          description: Internal CRM event attachment ID.
          type: integer
          example: 9001
        name:
          description: Original file name.
          type: string
          example: note.pdf
        mimeType:
          description: Attachment MIME type.
          type: string
          example: application/pdf
        url:
          description: Direct attachment URL when available.
          type: string
          example: https://cdn.fintoro.sk/contact-activity-attachments/note.pdf
    RelatedDocument:
      description: Live linked document resolved by the backend from `relatedEntity`.
      type: object
      properties:
        documentType:
          description: Linked document type.
          type: string
          enum: [invoice, proforma, order, quotation, credit-note, received-invoice, received-receipt, warehouse-inbound-receipt, warehouse-outbound-receipt]
          example: invoice
        documentId:
          description: Linked document ID.
          type: integer
          example: 301
        name:
          description: Human-readable document label.
          type: string
          example: Invoice 20260001
        number:
          description: Document number.
          type: string
          example: '20260001'
        issueDate:
          description: Document issue date when available.
          type: string
          example: '2026-03-10'
        totalWithVat:
          description: Current live gross total of the linked document when available.
          type: [number, 'null']
          format: float
          example: 121.0
        currency:
          description: Current linked document currency when available.
          anyOf:
            - $ref: '#/components/schemas/Currency'
            - type: 'null'
    ContactActivityLogMetadata:
      description: >-
        CRM event response metadata tailored for the Fintoro API. For document-related event types, the live
        linked document is returned directly in `relatedDocument`, and snapshot amounts expose their snapshot
        currency through `documentCurrencySnapshot`.
      type: object
      properties:
        content:
          description: Stored note text, email body, or phone-call summary of the CRM event. Available only for response types `note`, `email`, and `phone_call`.
          type: [string, 'null']
          example: Follow-up call summary
        email:
          description: Email address stored on the CRM event. Available only for response type `email`.
          type: [string, 'null']
          format: email
          example: crm@example.test
        personName:
          description: Name of the person involved in the phone call. Available only for response type `phone_call`.
          type: [string, 'null']
          example: John Caller
        phoneNumber:
          description: Phone number of the person involved in the phone call, when provided. Available only for response type `phone_call`.
          type: [string, 'null']
          example: '+421900000000'
        documentNumberSnapshot:
          description: Snapshot of the document number stored on lifecycle events `document_created`, `document_updated`, and `document_deleted`.
          type: [string, 'null']
          example: '20260001'
        documentPriceSnapshot:
          description: Snapshot of the document gross total stored on lifecycle events `document_created` and `document_updated`.
          type: [number, 'null']
          format: float
          example: 121.0
        documentCurrencySnapshot:
          description: Currency snapshot used for snapshot amounts in metadata. Available on lifecycle events that expose a snapshot amount or payment amount.
          anyOf:
            - $ref: '#/components/schemas/Currency'
            - type: 'null'
        paidAmount:
          description: Amount of the added payment stored on the `document_payment_added` event.
          type: [number, 'null']
          format: float
          example: 25.5
        relatedDocument:
          description: Linked document. Available only for `document_linked`, `document_created`, `document_updated`, `document_deleted`, and `document_payment_added`. `null` when the linked document no longer exists.
          anyOf:
            - $ref: '#/components/schemas/RelatedDocument'
            - type: 'null'
    ContactActivityLog:
      description: Unified CRM event.
      type: object
      properties:
        id:
          description: Internal CRM event ID.
          type: integer
          example: 551
        type:
          description: CRM event type.
          type: string
          enum: [note, email, phone_call, document_linked, document_created, document_updated, document_deleted, document_payment_added]
          example: note
        metadata:
          description: CRM event metadata prepared for the Fintoro API response.
          $ref: '#/components/schemas/ContactActivityLogMetadata'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ContactActivityLogAttachment'
        businessCaseId:
          description: Business case ID when the activity is linked to a business case.
          type: [integer, 'null']
          example: 501
        clientId:
          description: Client ID when the activity is linked directly to a client outside a business case.
          type: [integer, 'null']
          example: 101
        supplierId:
          description: Supplier ID when the activity is linked directly to a supplier outside a business case.
          type: [integer, 'null']
          example: 151
        createdAt:
          description: CRM event creation timestamp.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:00:00+01:00'
        updatedAt:
          description: CRM event last update timestamp.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:30:00+01:00'
    ContactActivityLogCreateInput:
      description: >-
        Payload for creating a CRM event. You must send exactly one of `businessCaseId`, `clientId`, or `supplierId`,
        together with `type` and `metadata`. Optional `attachmentUploadTokens[]` expect values returned by the
        `contact-activity-attachments` endpoint. Attachments are not supported for the `document_linked` type.
      type: object
      required: [type, metadata]
      properties:
        businessCaseId:
          type: [integer, 'null']
          example: 501
        clientId:
          type: [integer, 'null']
          example: 101
        supplierId:
          type: [integer, 'null']
          example: 151
        type:
          type: string
          enum: [note, email, phone_call, document_linked]
          example: note
        metadata:
          description: Type-dependent payload. Do not send snapshot fields or `relatedDocument`; those are computed or persisted by the backend.
          type: object
          properties:
            content:
              description: Note text, email body, or phone-call summary. Available only for payload types `note`, `email`, and `phone_call`. Required when `type` is one of those three values.
              type: [string, 'null']
              example: Follow-up call summary
            email:
              description: Sender or recipient email address. Available only for payload type `email`. Required when `type=email`.
              type: [string, 'null']
              format: email
              example: crm@example.test
            personName:
              description: Name of the person involved in the phone call. Available only for payload type `phone_call`. Required when `type=phone_call`.
              type: [string, 'null']
              example: John Caller
            phoneNumber:
              description: Phone number of the person involved in the phone call. Available only for payload type `phone_call`. Optional.
              type: [string, 'null']
              example: '+421900000000'
            documentType:
              description: Document type to link. Available only for payload type `document_linked`. Required when `type=document_linked`.
              type: [string, 'null']
              enum: [invoice, proforma, order, quotation, credit-note]
              example: invoice
            documentId:
              description: ID of the current-company document to link. Available only for payload type `document_linked`. Required when `type=document_linked`.
              type: [integer, 'null']
              example: 301
        attachmentUploadTokens:
          type: array
          items:
            type: string
          example:
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0xIn0=
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0yIn0=
    ContactActivityLogUpdateInput:
      description: >-
        Payload for updating a CRM event. Only `metadata`, optional new `attachmentUploadTokens[]`,
        and optional `deletedAttachmentIds[]` are mutable. `type`, `businessCaseId`, `clientId`, and `supplierId`
        are forbidden on update.
      type: object
      required: [metadata]
      properties:
        metadata:
          description: Type-dependent payload for the existing CRM event type. Do not send snapshot fields or `relatedDocument`; those are computed or persisted by the backend.
          type: object
          properties:
            content:
              description: Note text, email body, or phone-call summary. Available only for existing types `note`, `email`, and `phone_call`. Required when the existing type is one of those three values.
              type: [string, 'null']
              example: Follow-up call summary
            email:
              description: Sender or recipient email address. Available only for existing type `email`. Required when the existing type is `email`.
              type: [string, 'null']
              format: email
              example: crm@example.test
            personName:
              description: Name of the person involved in the phone call. Available only for existing type `phone_call`. Required when the existing type is `phone_call`.
              type: [string, 'null']
              example: John Caller
            phoneNumber:
              description: Phone number of the person involved in the phone call. Available only for existing type `phone_call`. Optional.
              type: [string, 'null']
              example: '+421900000000'
            documentType:
              description: Linked document type. Available only for existing type `document_linked`. Required when the existing type is `document_linked`.
              type: [string, 'null']
              enum: [invoice, proforma, order, quotation, credit-note]
              example: invoice
            documentId:
              description: ID of the linked current-company document. Available only for existing type `document_linked`. Required when the existing type is `document_linked`.
              type: [integer, 'null']
              example: 301
        attachmentUploadTokens:
          type: array
          items:
            type: string
          example:
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0xIn0=
        deletedAttachmentIds:
          type: array
          items:
            type: integer
          example: [9001]
    BankAccount:
      description: Bank account. This object combines the business account fields, bank details, and open banking state.
      type: object
      properties:
        id:
          description: Internal Fintoro bank account ID.
          type: integer
          example: 201
        bankId:
          description: "Bank ID from the [banks lookup endpoint](#operation/listBanks). If `null`, the account is not linked to a known bank from the public lookup."
          type: [integer, 'null']
          example: 1
        bank:
          description: Nested bank object corresponding to `bankId`, when the bank is known and still available in the lookup dataset.
          anyOf:
            - $ref: '#/components/schemas/Bank'
            - type: 'null'
        isPrimary:
          description: Indicates whether this account is currently marked as the company's primary bank account.
          type: boolean
          example: true
        autoPaymentMatching:
          description: Indicates whether the account is currently connected to automatic payment matching through open banking. This value is derived from the presence of an open banking connection and is never sent in the request payload.
          type: boolean
          example: true
        name:
          description: User-facing bank account name shown in Fintoro.
          type: string
          example: Main account
        iban:
          description: Bank account IBAN.
          type: string
          example: SK3111000000001234567890
        swift:
          description: SWIFT or BIC code of the bank account.
          type: string
          example: TATRSKBX
        autoPairingStrategy:
          description: Automatic payment pairing strategy used for this bank account.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          example: by_variable_symbol
        balance:
          description: Last known account balance, when available from open banking.
          type: [number, 'null']
          format: float
          example: 1234.56
        lastSyncedAt:
          description: Date and time of the last successful open banking sync, when available.
          type: [string, 'null']
          example: '2026-03-01 10:15:16'
        openBankingValidUntil:
          description: Date until which the current open banking consent remains valid, if present.
          type: [string, 'null']
          format: date
          example: '2026-04-30'
        createdAt:
          description: Date and time when the bank account was created.
          type: [string, 'null']
          example: '2026-03-03 12:00:00'
        updatedAt:
          description: Date and time of the most recent bank account change.
          type: [string, 'null']
          example: '2026-03-03 15:45:00'
    Whoami:
      description: Minimal identity of the company in whose context the bearer token executes requests.
      type: object
      required: [name]
      properties:
        name:
          description: Company name assigned to the current bearer token.
          type: string
          example: Acme s.r.o.
    Bank:
      description: Bank available through Fintoro API lookup endpoints. This is a stable lookup dataset whose existing bank IDs do not change or get reassigned.
      type: object
      properties:
        id:
          description: Stable bank ID used in Fintoro. Existing IDs do not change or get reassigned when new banks are added.
          type: integer
          example: 23
        name:
          description: Bank name.
          type: string
          example: Tatra Banka
        swift:
          description: Bank SWIFT code if available.
          type: string
          example: TATRSKBX
    BankAccountCreateInput:
      description: Payload used to create a bank account. Send only the business fields of the account. Fields with backend defaults are derived on the server side when omitted.
      type: object
      required: [name, iban, swift]
      properties:
        bankId:
          description: "Optional bank ID from the [banks lookup endpoint](#operation/listBanks). Use it when you want to link the account to a specific bank from the public lookup."
          type: [integer, 'null']
          example: 1
        name:
          description: Bank account name you want to use inside Fintoro.
          type: string
          maxLength: 255
          example: Main account
        iban:
          description: IBAN of the bank account. It must be valid and unique within the token scope.
          type: string
          example: SK3111000000001234567890
        swift:
          description: SWIFT or BIC code of the bank account.
          type: string
          maxLength: 255
          example: TATRSKBX
        autoPairingStrategy:
          description: Automatic payment pairing strategy for this account. If omitted, the default value `by_variable_symbol` is used.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          default: by_variable_symbol
          example: by_variable_symbol
    BankAccountUpdateInput:
      description: Payload used to update a bank account. Send only the fields you want to change. Fields you omit keep their current value.
      type: object
      properties:
        bankId:
          description: "Optional bank ID from the [banks lookup endpoint](#operation/listBanks). Send `null` if you want to remove the bank link."
          type: [integer, 'null']
          example: 1
        name:
          description: New bank account name.
          type: string
          maxLength: 255
          example: Main account
        iban:
          description: New IBAN of the bank account. It must remain valid and unique within the token scope.
          type: string
          example: SK3111000000001234567890
        swift:
          description: New SWIFT or BIC code of the bank account.
          type: string
          maxLength: 255
          example: TATRSKBX
        autoPairingStrategy:
          description: New automatic payment pairing strategy for this account. If omitted, the existing value stays unchanged.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          example: by_price
        isPrimary:
          description: Send `true` if this account should become the company's primary account. Omitting the field or sending `false` keeps the current primary assignment unchanged and does not turn the account into a non-primary one.
          type: boolean
          example: true
    Warehouse:
      description: Warehouse, including inbound and outbound numbering-series configuration.
      type: object
      properties:
        id:
          description: Internal warehouse ID in Fintoro.
          type: integer
          example: 301
        name:
          description: Warehouse name displayed in Fintoro.
          type: string
          example: Main warehouse
        code:
          description: Internal warehouse code unique within the token scope.
          type: string
          example: MAIN-WH
        inboundNumericalSeriesPattern:
          description: Numbering-series pattern used for warehouse inbound receipts of this warehouse.
          type: string
          example: INB-(YY)-(CCCC)
        inboundNumericalSeriesNextNumber:
          description: Next sequence number that will be used when automatically generating a warehouse inbound receipt.
          type: integer
          example: 12
        outboundNumericalSeriesPattern:
          description: Numbering-series pattern used for warehouse outbound receipts of this warehouse.
          type: string
          example: OUT-(YY)-(CCCC)
        outboundNumericalSeriesNextNumber:
          description: Next sequence number that will be used when automatically generating a warehouse outbound receipt.
          type: integer
          example: 8
    WarehouseCreateInput:
      description: Payload used to create a warehouse. All business fields are required.
      type: object
      required:
        - name
        - code
        - inboundNumericalSeriesPattern
        - inboundNumericalSeriesNextNumber
        - outboundNumericalSeriesPattern
        - outboundNumericalSeriesNextNumber
      properties:
        name:
          description: Warehouse name.
          type: string
          maxLength: 255
          example: Main warehouse
        code:
          description: Internal warehouse code unique within the token scope.
          type: string
          maxLength: 255
          example: MAIN-WH
        inboundNumericalSeriesPattern:
          description: Numbering-series pattern for warehouse inbound receipts. It must contain a counter token.
          type: string
          maxLength: 255
          example: INB-(YY)-(CCCC)
        inboundNumericalSeriesNextNumber:
          description: Next sequence number for the inbound series. Minimum value is `1`.
          type: integer
          minimum: 1
          example: 1
        outboundNumericalSeriesPattern:
          description: Numbering-series pattern for warehouse outbound receipts. It must contain a counter token.
          type: string
          maxLength: 255
          example: OUT-(YY)-(CCCC)
        outboundNumericalSeriesNextNumber:
          description: Next sequence number for the outbound series. Minimum value is `1`.
          type: integer
          minimum: 1
          example: 1
    WarehouseUpdateInput:
      description: Payload used to update a warehouse. The Fintoro API uses a full `PUT` contract, so the same business fields are required as on create.
      allOf:
        - $ref: '#/components/schemas/WarehouseCreateInput'
    SupplierSnapshot:
      description: Historical supplier snapshot stored directly on the document.
      type: object
      properties:
        name:
          description: Supplier company name or person name stored on the document.
          type: string
          example: Supply s.r.o.
        type:
          description: Supplier type stored in the snapshot.
          type: string
          example: company
        subjectId:
          description: Supplier business ID stored in the snapshot, when available.
          type: [string, 'null']
          example: '12345678'
        taxId:
          description: Supplier tax ID stored in the snapshot, when available.
          type: [string, 'null']
          example: '2020123456'
        vatId:
          description: Supplier VAT ID stored in the snapshot, when available.
          type: [string, 'null']
          example: SK2020123456
        isVatPayer:
          description: Indicates whether the supplier was marked as a VAT payer at the time the snapshot was stored.
          type: boolean
          example: true
        email:
          description: Supplier contact email stored in the snapshot.
          type: [string, 'null']
          example: billing@supply.test
        street:
          description: Street and number of the supplier billing address stored in the snapshot.
          type: [string, 'null']
          example: Supplier Street 1
        city:
          description: City of the supplier billing address stored in the snapshot.
          type: [string, 'null']
          example: Bratislava
        zip:
          description: ZIP or postal code of the supplier billing address stored in the snapshot.
          type: [string, 'null']
          example: '81101'
        countryId:
          description: "Country ID from the [country reference table](/en/reference-tables#countries)."
          type: [integer, 'null']
          example: 703
        country:
          description: Supplier billing country stored in the snapshot as a nested object.
          anyOf:
            - $ref: '#/components/schemas/Country'
            - type: 'null'
    WarehouseReceiptItem:
      description: One line item of a warehouse inbound or outbound receipt.
      type: object
      properties:
        id:
          description: Internal warehouse-document item ID.
          type: integer
          example: 7001
        direction:
          description: Stock movement direction represented by this line item.
          type: string
          enum: [incoming, outgoing]
          example: incoming
        receiptId:
          description: ID of the parent warehouse document.
          type: integer
          example: 901
