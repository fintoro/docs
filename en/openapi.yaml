    InvoiceClientInput:
      description: >-
        Sparse client payload used during invoice create or update. When you send `clientId`, this object acts as an optional snapshot override only for the specific document. When `clientId` is omitted, the backend tries to match an existing client or create a new one from this payload.
      type: object
      properties:
        name:
          description: Company name or person name. This field is required when `clientId` is not provided.
          type: string
          maxLength: 255
          example: Acme s.r.o.
        type:
          description: Client type. Allowed values are `person` and `company`. If omitted, the backend infers it from the identification fields.
          type: string
          enum: [person, company]
          example: company
        subjectId:
          description: Business ID of the client or company.
          type: [string, 'null']
          maxLength: 40
          example: '12345678'
        taxId:
          description: Tax ID of the client or company.
          type: [string, 'null']
          maxLength: 20
          example: '2020123456'
        vatId:
          description: VAT ID of the client or company.
          type: [string, 'null']
          maxLength: 20
          example: SK2020123456
        isVatPayer:
          description: Optional VAT payer flag. If omitted and `vatId` is provided, the backend derives it automatically.
          type: boolean
          example: true
        email:
          description: Client contact email.
          type: [string, 'null']
          format: email
          maxLength: 255
          example: billing@acme.test
        street:
          description: Billing street of the client. With sparse overrides it changes only the snapshot stored on this document.
          type: [string, 'null']
          maxLength: 255
          example: Main Street 1
        city:
          description: Billing city of the client.
          type: [string, 'null']
          maxLength: 255
          example: Bratislava
        zip:
          description: Billing ZIP or postal code of the client.
          type: [string, 'null']
          maxLength: 20
          example: '81101'
        countryId:
          type: [integer, 'null']
          description: "Country ID from the [country reference table](/en/reference-tables#countries)."
          example: 703
        hasDeliveryAddress:
          description: Optional delivery address flag. If omitted, the backend can infer it from the delivery address fields.
          type: boolean
          example: true
        deliveryStreet:
          description: Delivery street stored in the snapshot for this document.
          type: [string, 'null']
          maxLength: 255
          example: Warehouse Street 5
        deliveryCity:
          description: Delivery city stored in the snapshot for this document.
          type: [string, 'null']
          maxLength: 255
          example: Trnava
        deliveryZip:
          description: Delivery ZIP or postal code stored in the snapshot for this document.
          type: [string, 'null']
          maxLength: 20
          example: '91701'
        deliveryCountryId:
          type: [integer, 'null']
          description: "Country ID of the delivery address from the [country reference table](/en/reference-tables#countries)."
          example: 703
    InvoiceInput:
      description: >-
        Payload used to create an invoice. The usual happy path is `clientId` plus `items`; the backend can resolve many other values automatically. You must send either `clientId` or `client`.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manual invoice number. If omitted, the backend generates it from the numbering series. If you send `number`, do not send `numericalSeriesId` in the same payload.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        proformaId:
          description: Optional ID of the proforma invoice the invoice is created from.
          type: [integer, 'null']
          example: 401
        orderId:
          description: Optional ID of the order the invoice is created from.
          type: [integer, 'null']
          example: 501
        quotationId:
          description: Optional ID of the quotation the invoice is created from.
          type: [integer, 'null']
          example: 601
        clientId:
          description: Existing client ID. This is the recommended way to create an invoice. If you also send the `client` object, it is applied as a sparse snapshot override for this specific document.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse client payload. When `clientId` is sent, it overrides the client snapshot for this document only. When `clientId` is omitted, the backend uses it to match or create the client.
          anyOf:
            - $ref: '#/components/schemas/InvoiceClientInput'
            - type: 'null'
        businessCaseId:
          description: Optional business case ID. When sent, it must be available in the token scope and to the client resolved as the final `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: Numbering series ID. If omitted together with `number`, the primary invoice series is used. If you send `numericalSeriesId`, do not send manual `number` in the same payload.
          type: [integer, 'null']
          example: 12
        bankAccountId:
          description: Bank account ID to use on the invoice. It must be available in the token scope. If omitted, the primary company bank account is used. If the company has no primary bank account configured, the endpoint returns a `422` validation error on `bankAccountId`.
          type: integer
          example: 201
        issueDate:
          description: Issue date in `Y-m-d` format. It must be after `2009-01-01` and before a date one year in the future. If omitted, today's date is used.
          type: string
          format: date
          example: '2026-03-03'
        dueDateDays:
          description: Number of due days. Precedence is payload → client default → company document settings.
          type: integer
          minimum: 0
          maximum: 1000
          example: 14
        deliveryDate:
          description: Delivery date in `Y-m-d` format. If sent, it must be less than or equal to `issueDate`. If omitted, `issueDate` is used.
          type: string
          format: date
          example: '2026-03-03'
        variableSymbol:
          description: Variable symbol. Allowed values have 1 to 10 digits. If omitted, the backend derives it from the final invoice number.
          type: integer
          minimum: 0
          maximum: 9999999999
          example: 20260001
        constantSymbol:
          description: Constant symbol. Allowed values have 1 to 4 digits. Precedence is payload → client default → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999
          example: 308
        specificSymbol:
          description: Specific symbol. Allowed values have 1 to 10 digits. Precedence is payload → client default → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999999999
          example: 55
        discountType:
          description: Document-level discount type.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Document-level discount value.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Reverse-charge tax liability flag. If omitted, `false` is used.
          type: boolean
          example: false
        deliveryMethodId:
          type: integer
          description: "Delivery method ID from the [delivery method reference table](/en/reference-tables#delivery-methods). Precedence is payload → client default → company document settings."
          example: 1
        paymentMethodId:
          type: integer
          description: "Payment method ID from the [payment method reference table](/en/reference-tables#payment-methods). Precedence is payload → client default → company document settings."
          example: 1
        currencyId:
          type: integer
          description: "Currency ID from the [currency reference table](/en/reference-tables#currencies). Precedence is payload → client default → company document settings."
          example: 1
        currencyRate:
          description: Currency exchange rate against EUR. If omitted, the backend resolves it server-side from `currencyId` and `deliveryDate`. If the final document currency is `EUR`, the backend always stores and returns `1.0`.
          type: number
          format: float
          minimum: 0.00001
          maximum: 10000000
          example: 1.0
        languageId:
          type: integer
          description: "Language ID from the [language reference table](/en/reference-tables#languages). Precedence is payload → client default → company document settings."
          example: 1
        qrTypeId:
          type: integer
          description: "QR type ID from the [QR type reference table](/en/reference-tables#qr-types). If omitted, the company document settings value is used."
          example: 1
        note:
          description: Note shown on the document. Precedence is payload → client default → company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for your order.
        textAboveItems:
          description: Text shown above the line items. Precedence is payload → client default → company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for working with us.
        items:
          description: Invoice line items. This field stays required even when the backend resolves most other values automatically.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/InvoiceItemInput'
    CreditNoteInput:
      description: >-
        Payload used to create a credit note. This is an explicit create flow without inline client resolution. You must send the complete
        business payload including `invoiceId`, all key document fields, and items. The client is derived automatically from the source
        invoice and the resulting credit note total must stay negative.
      type: object
      required:
        - invoiceId
        - number
        - issueDate
        - dueDate
        - deliveryDate
        - bankAccountId
        - variableSymbol
        - transferTaxLiability
        - paymentMethodId
        - currencyId
        - currencyRate
        - languageId
        - items
      properties:
        invoiceId:
          description: ID of the original invoice the credit note references. The invoice must be available in the token scope.
          type: integer
          example: 301
        businessCaseId:
          description: Optional business case ID. When sent, it must be available in the token scope and to the client derived from the source invoice.
          type: [integer, 'null']
          example: 701
        number:
          description: Explicit credit-note number. It must be unique across invoices and credit notes. This flow requires `number`, so do not send `numericalSeriesId` together with it.
          type: string
          minLength: 1
          maxLength: 20
          example: '20260051'
        numericalSeriesId:
          description: Numbering series ID for credit notes. In this explicit public create/update flow, do not send it together with the required `number` field.
          type: [integer, 'null']
          example: 12
        issueDate:
          description: Issue date in `Y-m-d` format.
          type: string
          format: date
          example: '2026-03-03'
        dueDate:
          description: Due date in `Y-m-d` format. It must be greater than or equal to `issueDate`.
          type: string
          format: date
          example: '2026-03-17'
        deliveryDate:
          description: Delivery date in `Y-m-d` format. It must be less than or equal to `issueDate`.
          type: string
          format: date
          example: '2026-03-03'
        bankAccountId:
          description: Company bank account ID used on the credit note.
          type: integer
          example: 201
        variableSymbol:
          description: Variable symbol with 1 to 10 digits.
          type: integer
          minimum: 0
          maximum: 9999999999
          example: 20260051
        constantSymbol:
          description: Constant symbol with 1 to 4 digits.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999
          example: 308
        specificSymbol:
          description: Specific symbol with 1 to 10 digits.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999999999
          example: 55
        discountType:
          description: Document-level discount type.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Document-level discount value.
          type: [number, 'null']
          format: float
          example: 10.0
        transferTaxLiability:
          description: Reverse-charge tax liability flag.
          type: boolean
          example: false
        paymentMethodId:
          type: integer
          description: "Payment method ID from the [payment method reference table](/en/reference-tables#payment-methods)."
          example: 1
        currencyId:
          type: integer
          description: "Currency ID from the [currency reference table](/en/reference-tables#currencies)."
          example: 1
        currencyRate:
          description: Currency exchange rate against EUR. If the document currency is `EUR`, the backend always stores and returns `1.0`.
          type: number
          format: float
          minimum: 0.00001
          maximum: 10000000
          example: 1.0
        languageId:
          type: integer
          description: "Language ID from the [language reference table](/en/reference-tables#languages)."
          example: 1
        note:
          description: Note shown on the document.
          type: [string, 'null']
          maxLength: 3000
          example: Credit note for the original invoice.
        textAboveItems:
          description: Text shown above the line items.
          type: [string, 'null']
          maxLength: 3000
          example: We are crediting part of the original supply.
        items:
          description: Credit note line items. The resulting document must have a negative total amount.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/InvoiceItemInput'
    InvoiceCreditNoteInput:
      description: >-
        Optional override payload for the shortcut endpoint `POST /invoices/{invoice}/credit-notes`. All other credit-note business fields
        are derived server-side from the source invoice. It does not accept items, client data, or bank account data in the request.
      type: object
      properties:
        number:
          description: Manual credit-note number. If omitted, the backend uses the number from the primary credit-note numbering series, or from the series selected via `numericalSeriesId`. If you send `number`, do not send `numericalSeriesId` in the same payload.
          type: string
          minLength: 1
          maxLength: 20
          example: '20260051'
        numericalSeriesId:
          description: Credit-note numbering series ID. When sent without `number`, the backend generates the final credit-note number from this series. If you send `numericalSeriesId`, do not send manual `number` in the same payload.
          type: [integer, 'null']
          example: 12
        issueDate:
          description: Optional issue date in `Y-m-d` format. If omitted, today's date is used.
          type: string
          format: date
          example: '2026-03-05'
        dueDate:
          description: Optional due date in `Y-m-d` format. If omitted, the effective `issueDate` is used. When sent, it must be greater than or equal to the effective `issueDate`.
          type: string
          format: date
          example: '2026-03-19'
        deliveryDate:
          description: Optional delivery date in `Y-m-d` format. If omitted, the effective `issueDate` is used. When sent, it must be less than or equal to the effective `issueDate`.
          type: string
          format: date
          example: '2026-03-04'
        note:
          description: Optional note override. If omitted, the backend uses the `note` from the source invoice. If you send `null`, the note is cleared.
          type: [string, 'null']
          maxLength: 3000
          example: Credit note for a partial cancellation of the supply.
        textAboveItems:
          description: Optional override for the text shown above the line items. If omitted, the backend uses `textAboveItems` from the source invoice. If you send `null`, the text is cleared.
          type: [string, 'null']
          maxLength: 3000
          example: We are fully crediting the original supply.
    ProformaInput:
      description: >-
        Payload used to create a proforma. The usual happy path is `clientId` plus `items`; the backend can resolve many other values automatically. You must send either `clientId` or `client`.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manual proforma number. If omitted, the backend generates it from the numbering series. If you send `number`, do not send `numericalSeriesId` in the same payload.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        orderId:
          description: Optional ID of the order the proforma is created from.
          type: [integer, 'null']
          example: 501
        quotationId:
          description: Optional ID of the quotation the proforma is created from.
          type: [integer, 'null']
          example: 601
        clientId:
          description: Existing client ID. This is the recommended way to create a proforma. If you also send the `client` object, it is applied as a sparse snapshot override for this specific document.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse client payload. When `clientId` is sent, it overrides the client snapshot for this document only. When `clientId` is omitted, the backend uses it to match or create the client.
          anyOf:
            - $ref: '#/components/schemas/InvoiceClientInput'
            - type: 'null'
        businessCaseId:
          description: Optional business case ID. When sent, it must be available in the token scope and to the client resolved as the final `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: Numbering series ID. If omitted together with `number`, the primary proforma series is used. If you send `numericalSeriesId`, do not send manual `number` in the same payload.
          type: [integer, 'null']
          example: 12
        bankAccountId:
          description: Bank account ID to use on the document. It must be available in the token scope. If omitted, the primary company bank account is used. If the company has no primary bank account configured, the endpoint returns a `422` validation error on `bankAccountId`.
          type: integer
          example: 201
        issueDate:
          description: Issue date in `Y-m-d` format. It must be after `2009-01-01` and before a date one year in the future. If omitted, today's date is used.
          type: string
          format: date
          example: '2026-03-03'
        dueDateDays:
          description: Number of due days. Precedence is payload → client default → company document settings.
          type: integer
          minimum: 0
          maximum: 1000
          example: 14
        variableSymbol:
          description: Variable symbol. Allowed values have 1 to 10 digits. If omitted, the backend derives it from the final document number.
          type: integer
          minimum: 0
          maximum: 9999999999
          example: 20260001
        constantSymbol:
          description: Constant symbol. Allowed values have 1 to 4 digits. Precedence is payload → client default → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999
          example: 308
        specificSymbol:
          description: Specific symbol. Allowed values have 1 to 10 digits. Precedence is payload → client default → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999999999
          example: 55
        discountType:
          description: Document-level discount type.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Document-level discount value.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Reverse-charge tax liability flag. If omitted, `false` is used.
          type: boolean
          example: false
        deliveryMethodId:
          type: integer
          description: "Delivery method ID from the [delivery method reference table](/en/reference-tables#delivery-methods). Precedence is payload → client default → company document settings."
          example: 1
        paymentMethodId:
          type: integer
          description: "Payment method ID from the [payment method reference table](/en/reference-tables#payment-methods). Precedence is payload → client default → company document settings."
          example: 1
        currencyId:
          type: integer
          description: "Currency ID from the [currency reference table](/en/reference-tables#currencies). Precedence is payload → client default → company document settings."
          example: 1
        languageId:
          type: integer
          description: "Language ID from the [language reference table](/en/reference-tables#languages). Precedence is payload → client default → company document settings."
          example: 1
        qrTypeId:
          type: integer
          description: "QR type ID from the [QR type reference table](/en/reference-tables#qr-types). If omitted, the company document settings value is used."
          example: 1
        note:
          description: Note shown on the document. Precedence is payload → client default → company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for your order.
        textAboveItems:
          description: Text shown above the line items. Precedence is payload → client default → company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for working with us.
        items:
          description: Proforma line items. This field stays required at all times.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/InvoiceItemInput'

    InvoiceUpdateItemInput:
      description: >-
        Payload for a single invoice line item during update. The validation rules are the same as in create, but you may additionally send the original `uuid` of an existing invoice row. You can obtain that UUID from the invoice detail response. The backend uses it during warehouse allocation and outbound receipt synchronization so it can match the edited line with the original stored line.
      allOf:
        - $ref: '#/components/schemas/InvoiceItemInput'
        - type: object
          properties:
            uuid:
              description: UUID of the original invoice row, obtained from the invoice detail response. Send it only when updating existing line items and you need warehouse movement and outbound receipt links to stay attached to the same logical row. The UUID must belong to a line item on the invoice being updated.
              type: [string, 'null']
              format: uuid
              example: 6b1b8c9e-66e6-4fb5-b2db-6d7c7f0f8f19

    InvoiceUpdateInput:
      description: >-
        Payload used to update an invoice. Update uses the same fields, validation rules, and defaults as the create flow. You must send either `clientId` or the `client` object. Omitted fields are not copied from the current invoice; the backend resolves them exactly like in the create flow. The only difference compared to create is that line items may additionally carry the original `uuid` values of existing invoice rows.
      allOf:
        - $ref: '#/components/schemas/InvoiceInput'
        - type: object
          properties:
            proformaId:
              description: Optional ID of the proforma invoice that should define the final invoice state. On update, this ID may either still be unassigned or already linked to the invoice being updated.
              type: [integer, 'null']
              example: 401
            orderId:
              description: Optional ID of the order that should define the final invoice state. On update, this ID may either still be unassigned or already linked to the invoice being updated.
              type: [integer, 'null']
              example: 501
            quotationId:
              description: Optional ID of the quotation that should define the final invoice state. On update, this ID may either still be unassigned or already linked to the invoice being updated.
              type: [integer, 'null']
              example: 601
            items:
              description: Invoice line items. This field stays required on update. If you send the original `uuid` of an existing line item from the invoice detail response, the backend can preserve warehouse outbound receipt links and synchronize changed allocations on that same logical row.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceUpdateItemInput'
    CreditNoteUpdateInput:
      description: >-
        Payload used to update a credit note. Update uses the same fields and validation rules as the create flow. You must send the full
        business payload including `invoiceId` and `items`; omitted fields are not copied from the current credit note. The client is always
        derived from the selected source invoice.
      allOf:
        - $ref: '#/components/schemas/CreditNoteInput'
        - type: object
          properties:
            items:
              description: Credit note line items. This field stays required on update. If you send the original `uuid` of an existing line item from the credit note detail response, the backend can preserve warehouse inbound receipt links.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceUpdateItemInput'
    ProformaUpdateInput:
      description: >-
        Payload used to update a proforma. Update uses the same fields, validation rules, and defaults as the create flow. You must send either `clientId` or the `client` object. Omitted fields are not copied from the current proforma; the backend resolves them exactly like in the create flow.
      allOf:
        - $ref: '#/components/schemas/ProformaInput'
        - type: object
          properties:
            orderId:
              description: Optional ID of the order that should define the final proforma state. On update, this ID may either still be unassigned or already linked to the proforma being updated.
              type: [integer, 'null']
              example: 501
            quotationId:
              description: Optional ID of the quotation that should define the final proforma state. On update, this ID may either still be unassigned or already linked to the proforma being updated.
              type: [integer, 'null']
              example: 601
            items:
              description: Proforma line items. This field stays required on update.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceItemInput'
    OrderItemInput:
      description: >-
        Payload for a single order line item. Three modes are supported: a manual item, `priceListItemId + quantity`, or
        `priceListItemId` with sparse override fields. `quantity` is always required. If you omit `priceListItemId`, you must also send
        `name`, `unitId`, `unitPrice`, and `vatRate`. If you send `priceListItemId`, the backend can hydrate the name, unit,
        unit price, and VAT rate from the price list item, and the payload then acts only as a sparse override.
      type: object
      required: [quantity]
      anyOf:
        - required: [priceListItemId]
        - required: [name, unitId, unitPrice, vatRate]
      properties:
        name:
          description: Item name. Required for a manual item. When `priceListItemId` is used, it may override the name from the price list.
          type: [string, 'null']
          maxLength: 255
          example: Consulting
        description:
          description: Optional item description. With `priceListItemId`, it may override or complement the description from the price list item.
          type: [string, 'null']
          maxLength: 1000
          example: Monthly consulting package
        unitPrice:
          description: Unit price excluding VAT. Required for a manual item. With `priceListItemId`, it may override the price loaded from the price list.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 100.0
        unitId:
          description: "Unit ID from the [unit reference table](/en/reference-tables#units). Required for a manual item. With `priceListItemId`, it may override the unit from the price list item."
          type: [integer, 'null']
          example: 1
        quantity:
          description: Item quantity. This field is always required, regardless of whether the item is manual or hydrated from the price list.
          type: number
          format: float
          minimum: 0.00001
          maximum: 1000000
          example: 2.0
        vatRate:
          description: VAT rate in percent. Required for a manual item. With `priceListItemId`, it may override the VAT rate from the price list item.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 23
          example: 20.0
        discountType:
          description: Line-level discount type. Allowed values are `percentage` and `fixed`.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Line-level discount value. If you send `discountType`, you must also send this field.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 10.0
        discountName:
          description: Line-level discount name. If omitted while `discountType` and `discountValue` are present, the backend fills in localized `Discount` based on the document language.
          type: [string, 'null']
          maxLength: 255
          example: Loyalty discount
        priceListItemId:
          description: Price list item ID. If sent, the backend can hydrate the name, unit, price, and VAT rate from the price list item and the payload can act only as a sparse override.
          type: [integer, 'null']
          example: 501
    OrderClientInput:
      description: >-
        Sparse client payload used during order create or update. When you send `clientId`, this object acts as an optional client snapshot
        override only for the specific document. When `clientId` is omitted, the backend uses this object to match an existing client or create a new one.
      allOf:
        - $ref: '#/components/schemas/InvoiceClientInput'
    OrderInput:
      description: >-
        Payload used to create an order. The usual happy path is `clientId` plus `items`; the backend can resolve many other values automatically.
        You must send either `clientId` or the `client` object.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manual order number. If omitted, the backend generates it from the numbering series. If you send `number`, do not send `numericalSeriesId` in the same payload.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        quotationId:
          description: Optional ID of the quotation the order is created from. The document must be available in the token scope and must not be linked to another order.
          type: [integer, 'null']
          example: 601
        clientId:
          description: ID of an existing client. This is the recommended way to create an order. If you also send the `client` object, it is used only as a sparse snapshot override for this specific document.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse client payload. With `clientId`, it only overrides the snapshot stored on this document. Without `clientId`, the backend uses it to resolve or create the client.
          anyOf:
            - $ref: '#/components/schemas/OrderClientInput'
            - type: 'null'
        businessCaseId:
          description: Optional business case ID. When sent, it must be available in the token scope and to the client resolved as the final `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: Numbering series ID. If omitted together with `number`, the primary numbering series for orders is used. If you send `numericalSeriesId`, do not send manual `number` in the same payload.
          type: [integer, 'null']
          example: 12
        issueDate:
          description: Issue date in `Y-m-d` format. It must be after `2009-01-01` and before a date one year in the future. If omitted, the current date is used.
          type: string
          format: date
          example: '2026-03-03'
        discountType:
          description: Whole-document discount type.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Whole-document discount value.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Reverse-charge flag. If omitted, `false` is used.
          type: boolean
          example: false
        deliveryMethodId:
          type: integer
          description: "Delivery method ID from the [delivery method reference table](/en/reference-tables#delivery-methods). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        paymentMethodId:
          type: integer
          description: "Payment method ID from the [payment method reference table](/en/reference-tables#payment-methods). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        currencyId:
          type: integer
          description: "Currency ID from the [currency reference table](/en/reference-tables#currencies). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        languageId:
          type: integer
          description: "Language ID from the [language reference table](/en/reference-tables#languages). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        note:
          description: Document note. Resolution priority is payload -> client preference -> company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for your order.
        textAboveItems:
          description: Text displayed above items. Resolution priority is payload -> client preference -> company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for working with us.
        items:
          description: Order items. This field is always required. `uuid` and `warehouseAllocations` are not sent for orders.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OrderItemInput'
    OrderUpdateInput:
      description: >-
        Payload used to update an order. The update uses the same fields, validation rules, and defaults as the create flow.
        You must send either `clientId` or the `client` object. Omitted fields are not pulled from the current order; the backend
        resolves them exactly as in the create flow. If you omit `quotationId` during update, the existing quotation link is removed.
      allOf:
        - $ref: '#/components/schemas/OrderInput'
        - type: object
          properties:
            quotationId:
              description: Optional ID of the quotation that should define the final order state. During update, this ID may either still be unassigned or already linked to the currently edited order. If you omit the field or send `null`, the existing link is removed.
              type: [integer, 'null']
              example: 601
            items:
              description: Order items. This field is always required during update.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/OrderItemInput'
    QuotationItemInput:
      description: >-
        Payload of a single quotation item. Three modes are supported: a manual item, `priceListItemId + quantity`, or
        `priceListItemId` with sparse overrides for selected fields. `quantity` is always required. If you do not send
        `priceListItemId`, you must send `name`, `unitId`, `unitPrice`, and `vatRate`. If you do send `priceListItemId`, the
        backend can hydrate the name, unit, price, and VAT rate from the price list item and the payload acts only as a sparse
        override. `uuid` and `warehouseAllocations` are not sent for quotations.
      type: object
      required: [quantity]
      anyOf:
        - required: [priceListItemId]
        - required: [name, unitId, unitPrice, vatRate]
      properties:
        name:
          description: Item name. Required for manual items. When using `priceListItemId`, this can override the hydrated name.
          type: [string, 'null']
          maxLength: 255
          example: Consulting
        description:
          description: Optional item description. When using `priceListItemId`, this can override or supplement the hydrated description.
          type: [string, 'null']
          maxLength: 1000
          example: Monthly consulting package
        unitPrice:
          description: Unit price excluding VAT. Required for manual items. When using `priceListItemId`, this can override the hydrated price.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 100.0
        unitId:
          description: "Unit ID from the [unit reference table](/en/reference-tables#units). Required for manual items. When using `priceListItemId`, this can override the hydrated unit."
          type: [integer, 'null']
          example: 1
        quantity:
          description: Item quantity. This field is always required regardless of whether the item is manual or hydrated from a price list item.
          type: number
          format: float
          minimum: 0.00001
          maximum: 1000000
          example: 2.0
        vatRate:
          description: VAT rate in percent. Required for manual items. When using `priceListItemId`, this can override the hydrated VAT rate.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 23
          example: 20.0
        discountType:
          description: Item-level discount type. Allowed values are `percentage` and `fixed`.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Item-level discount value. If you send `discountType`, you must also send this field.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 10.0
        discountName:
          description: Item-level discount label. If you omit it while sending `discountType` and `discountValue`, the backend fills a localized default such as `Zľava` based on the document language.
          type: [string, 'null']
          maxLength: 255
          example: Loyalty discount
        priceListItemId:
          description: Price list item ID. When sent, the backend can hydrate the name, unit, price, and VAT rate from that price list item and the payload can act only as a sparse override.
          type: [integer, 'null']
          example: 501
    QuotationClientInput:
      description: >-
        Sparse client payload used when creating or updating a quotation. If you send `clientId`, this object acts only as an
        optional snapshot override for this specific document. If you omit `clientId`, the backend tries to find an existing client
        from this object or creates a new one.
      allOf:
        - $ref: '#/components/schemas/InvoiceClientInput'
    QuotationInput:
      description: >-
        Payload used to create a quotation. In the common case, sending `clientId` and `items` is enough; the backend can resolve
        the remaining fields. You must send either `clientId` or the `client` object.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manual quotation number. If omitted, the backend generates it from the numbering series. If you send `number`, do not send `numericalSeriesId` in the same payload.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        clientId:
          description: Existing client ID. This is the recommended way to create a quotation. If you also send the `client` object, it is used as a sparse client snapshot override for this specific document.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse client payload. If you send `clientId`, it acts as a snapshot override for this document. If you omit `clientId`, the backend uses these values to match or create a client.
          anyOf:
            - $ref: '#/components/schemas/QuotationClientInput'
            - type: 'null'
        businessCaseId:
          description: Optional business case ID. When sent, it must be available in the token scope and to the client resolved as the final `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: Numbering series ID. If omitted together with `number`, the primary numbering series for quotations is used. If you send `numericalSeriesId`, do not send manual `number` in the same payload.
          type: [integer, 'null']
          example: 12
        issueDate:
          description: Issue date in `Y-m-d` format. It must be after `2009-01-01` and before the date one year in the future. If omitted, today is used.
          type: string
          format: date
          example: '2026-03-03'
        validityDate:
          description: Validity date in `Y-m-d` format. It must be equal to or later than the final `issueDate`. If omitted, `issueDate + 30 days` is used.
          type: [string, 'null']
          format: date
          example: '2026-04-02'
        discountType:
          description: Document-level discount type.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Document-level discount value.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Reverse-charge flag. If omitted, `false` is used.
          type: boolean
          example: false
        currencyId:
          type: integer
          description: "Currency ID from the [currency reference table](/en/reference-tables#currencies). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        languageId:
          type: integer
          description: "Language ID from the [language reference table](/en/reference-tables#languages). Resolution priority is payload -> client preference -> company document settings."
          example: 1
        note:
          description: Document note. Resolution priority is payload -> client preference -> company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: This quotation is valid for 30 days.
        textAboveItems:
          description: Text displayed above items. Resolution priority is payload -> client preference -> company document settings.
          type: [string, 'null']
          maxLength: 3000
          example: Thank you for your interest.
        items:
          description: Quotation items. This field is always required. `uuid` and `warehouseAllocations` are not sent for quotations.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/QuotationItemInput'
    QuotationUpdateInput:
      description: >-
        Payload used to update a quotation. The update uses the same fields, validation rules, and defaults as the create flow.
        You must send either `clientId` or the `client` object. Omitted fields are not pulled from the current quotation; the
        backend resolves them exactly as in the create flow.
      allOf:
        - $ref: '#/components/schemas/QuotationInput'
        - type: object
          properties:
            items:
              description: Quotation items. This field is always required during update.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/QuotationItemInput'
