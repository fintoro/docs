    get:
      tags: [Document Payments]
      summary: List document payments
      operationId: listDocumentPayments
      description: Returns all payments for one public document. The list is not filtered or paginated; it always returns the full payment history of the selected document ordered from newest to oldest.
      parameters:
        - in: query
          name: documentType
          required: true
          description: Document type whose payments you want to load. Only `invoice`, `proforma`, and `credit-note` are supported.
          schema:
            type: string
            enum: [invoice, proforma, credit-note]
          example: invoice
        - in: query
          name: documentId
          required: true
          description: ID of a document.
          schema:
            type: integer
          example: 301
      responses:
        '200':
          description: Document payment list.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Payments of the selected document.
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentPayment'
        '422':
          description: Query parameters failed validation rules.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags: [Document Payments]
      summary: Create document payment
      operationId: createDocumentPayment
      description: |
        Creates a new payment for a public document.

        ### Supported document types

        Only `invoice`, `proforma`, and `credit-note` are supported.

        ### Business behavior

        - The payment is always linked to one document via `documentType` + `documentId`.
        - The minimal create payload is only `documentType` + `documentId`; all other fields can be omitted and are derived server-side.
        - If `paymentDate` is omitted, today's date is used.
        - If `paymentMethodId` is omitted, the payment method from the source document is used.
        - If `currencyId` is omitted, the currency from the source document is used.
        - If `amount` is omitted, the current remaining `toBePaid` amount from the source document is used.
        - If `currencyRate` is omitted, the system derives it from the final `paymentDate` using the previous day's rate.
        - If you send `currencyRate` for a currency other than `EUR`, that override value is used as-is.
        - If the final payment currency is `EUR`, the backend always stores and returns `currencyRate = 1.0`, even when you send a different value.
        - Creating a payment recalculates the document payment status exactly like the web and mobile flows.
        - If you later issue a payment receipt invoice for a proforma payment, the payment response may expose it in `receiptInvoice`.

        If you send an `Idempotency-Key`, the same key with the same payload returns the original response without creating the payment again.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentPaymentInput'
      responses:
        '201':
          description: Document payment created.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
              description: The original idempotency key when it was provided in the request.
              schema:
                type: string
            Idempotency-Status:
              description: '`Original` for the first processed request or `Repeated` when the original response is replayed.'
              schema:
                type: string
                enum: [Original, Repeated]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPayment'
        '422':
          description: The request payload failed validation rules or a payment business rule.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  error:
                    type: [string, 'null']
