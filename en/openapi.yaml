    post:
      tags: [Quotations]
      summary: Create quotation
      operationId: createQuotation
      description: |
        Creates a new quotation.

        ### Recommended flow

        The recommended happy path is to send `clientId` and `items`.

        If the client does not exist in Fintoro yet, or you do not want to create it in a separate step, send a `client` object without `clientId`. The backend will try to match an existing client and create a new one only if nothing matches.

        If you send both `clientId` and a `client` object, the `client` object acts as a sparse snapshot override for this specific quotation.

        ### How defaults work

        Most document fields are optional. The backend resolves them in this order:

        1. explicit payload value,
        2. client defaults,
        3. company document settings.

        In practice this means for example:

        - `number` and `numericalSeriesId` are resolved from the primary numbering series if you omit them,
        - `issueDate` defaults to today,
        - `validityDate` defaults to `issueDate + 30 days`,
        - `transferTaxLiability` defaults to `false`,
        - `currencyId`, `languageId`, `note`, and `textAboveItems` can be resolved from client defaults or company document settings.

        ### How client resolution works

        Client resolution is strictly deterministic:

        - if you send `clientId`, the backend loads that client within the token scope,
        - if you omit `clientId`, the `client` object is used for matching or creation,
        - if you send both `clientId` and `client`, the `client` object is used only as a document snapshot override.

        Matching is deterministic and uses this order:

        - for companies: `vatId`, then `countryId + subjectId`, then `name + email`, then `name + street`,
        - for people: `name + email`, then `name + street`.

        ### How item hydration works

        An item can be created in three ways:

        1. as a manual item with explicit name, unit, price, and VAT,
        2. via `priceListItemId` and `quantity`,
        3. via `priceListItemId` plus sparse overrides for selected fields such as price or name.

        `priceListItemId` is used only for input hydration. The quotation response returns the final canonical item shape and does not echo this price list reference back as a separate field.

        Quotations do not use per-item `uuid` or `warehouseAllocations`.

        The initial quotation status is `waiting`.

        If you send `Idempotency-Key`, the same key with the same payload returns the original response without creating a second quotation.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotationInput'
      responses:
        '201':
          description: The quotation was created.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
              description: Original idempotency key when it was sent in the request.
              schema:
                type: string
            Idempotency-Status:
              description: '`Original` for the first processing or `Repeated` when the original response is replayed.'
              schema:
                type: string
                enum: [Original, Repeated]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'
        '422':
          description: The request payload failed validation or cannot be processed because of a business rule.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              examples:
                idempotencyConflict:
                  summary: Idempotency key reused with a different payload
                  value:
                    error: Idempotency-Key reused with different request payload
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  error:
                    type: [string, 'null']
                    example: Idempotency-Key reused with different request payload
                  errors:
                    type: [object, 'null']
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
