        deliveryCity:
          description: City of the delivery address.
          type: [string, 'null']
          example: Kosice
        deliveryZip:
          description: ZIP or postal code of the delivery address.
          type: [string, 'null']
          example: '04001'
        deliveryCountry:
          description: Client delivery country as a nested object.
          anyOf:
            - $ref: '#/components/schemas/Country'
            - type: 'null'
        createdAt:
          description: Date and time when the client was created.
