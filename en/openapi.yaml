          example: Due within 14 days.
        preferredVariableSymbol:
          description: Default variable symbol. It is stored on the client and used as a fallback default when creating new documents for this client if you do not send an explicit value in the payload.
          type: [integer, 'null']
          example: 2026001
        preferredConstantSymbol:
