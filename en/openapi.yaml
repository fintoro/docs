          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proforma'
        '422':
          description: The request payload failed validation rules or cannot be processed because of a business rule failure.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              examples:
