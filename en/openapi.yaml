components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Bearer token created for a specific company in Integrations → API.
  parameters:
    ClientId:
      name: client
      in: path
      required: true
      description: Client ID.
      schema:
        type: integer
        example: 101
    SupplierId:
      name: supplier
      in: path
      required: true
      description: Supplier ID.
      schema:
        type: integer
        example: 151
    BusinessCaseStatusId:
      name: businessCaseStatus
      in: path
      required: true
      description: Business-case status ID.
      schema:
        type: integer
        example: 41
    BusinessCaseId:
      name: businessCase
      in: path
      required: true
      description: Business case ID.
      schema:
        type: integer
        example: 501
    ContactActivityLogId:
      name: contactActivityLog
      in: path
      required: true
      description: Contact activity ID.
      schema:
        type: integer
        example: 551
    BankAccountId:
      name: bankAccount
      in: path
      required: true
      description: Bank account ID.
      schema:
        type: integer
        example: 201
    WarehouseId:
      name: warehouse
      in: path
      required: true
      description: Warehouse ID.
      schema:
        type: integer
        example: 301
    WarehouseInboundReceiptId:
      name: warehouseInboundReceipt
      in: path
      required: true
      description: Warehouse inbound receipt ID.
      schema:
        type: integer
        example: 901
    WarehouseOutboundReceiptId:
      name: warehouseOutboundReceipt
      in: path
      required: true
      description: Warehouse outbound receipt ID.
      schema:
        type: integer
        example: 951
    PriceListItemId:
      name: priceListItem
      in: path
      required: true
      description: Price list item ID.
      schema:
        type: integer
        example: 701
    WebhookSubscriptionId:
      name: webhookSubscription
      in: path
      required: true
      description: Webhook subscription ID.
      schema:
        type: integer
        example: 801
    InvoiceId:
      name: invoice
      in: path
      required: true
      description: Invoice ID.
      schema:
        type: integer
        example: 301
    CreditNoteId:
      name: creditNote
      in: path
      required: true
      description: Credit note ID.
      schema:
        type: integer
        example: 351
    NumericalSeriesId:
      name: numericalSeries
      in: path
      required: true
      description: Numerical series ID.
      schema:
        type: integer
        example: 901
    DocumentPaymentId:
      name: documentPayment
      in: path
      required: true
      description: Document payment ID.
      schema:
        type: integer
        example: 801
    ProformaId:
      name: proforma
      in: path
      required: true
      description: Proforma ID.
      schema:
        type: integer
        example: 401
    OrderId:
      name: order
      in: path
      required: true
      description: Order ID.
      schema:
        type: integer
        example: 501
    QuotationId:
      name: quotation
      in: path
      required: true
      description: Quotation ID.
      schema:
        type: integer
        example: 601
    SubjectId:
      name: subject
      in: path
      required: true
      description: Subject ID from the reference registry.
      schema:
        type: integer
        example: 12345678
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional request identifier for safe retries. Use a unique value for each create request you want to retry safely.
      schema:
        type: string
        example: invoice-create-2026-03-03-001
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Optional response language. It localizes system-owned labels in lookups, in related response objects, and in validation errors. It does not translate user-generated data.
      schema:
        type: string
        example: en
  headers:
    XRequestId:
      description: Unique request identifier used for tracing, audit logs, and support diagnostics.
      schema:
        type: string
        example: req_public_api_01
    ContentLanguage:
      description: Language selected for the request based on `Accept-Language`.
      schema:
        type: string
        example: en
  responses:
    Unauthorized:
      description: The Fintoro API bearer token is missing, invalid, or revoked.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthenticated.
    NotFound:
      description: The requested resource was not found.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: No query results for model.
    Forbidden:
      description: Access to the resource is not allowed or scope.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: This action is unauthorized.
    ValidationError:
      description: Request payload or query parameters failed validation rules.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: The given data was invalid.
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
    TooManyRequests:
      description: The company exceeded the Fintoro API rate limit. This 429 response includes the same `X-RateLimit-Limit` and `X-RateLimit-Remaining` headers as other throttled responses and additionally adds `Retry-After` and `X-RateLimit-Reset`. If you need a higher limit, contact info@fintoro.sk for custom enterprise terms.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        X-RateLimit-Limit:
          description: Maximum number of requests allowed for the company in the current 60-second window. This header is returned on all throttled responses, not only on 429.
          schema:
            type: integer
            example: 120
        X-RateLimit-Remaining:
          description: Number of requests remaining for the company in the current 60-second window. This header is returned on all throttled responses, not only on 429.
          schema:
            type: integer
            example: 0
        Retry-After:
          description: Number of seconds after which you can safely retry the request. This header is sent only on 429 responses.
          schema:
            type: integer
            example: 60
        X-RateLimit-Reset:
          description: Unix timestamp when the current rate-limit window resets. This header is sent only on 429 responses.
          schema:
            type: integer
            example: 1774810800
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Too Many Attempts.
    InternalServerError:
      description: An unexpected internal error occurred. This should not happen in normal operation and is automatically reported to us.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Server Error
    ServiceUnavailable:
      description: The API is temporarily unavailable during scheduled maintenance. We announce planned downtime at least 24 hours in advance.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Service Unavailable
  schemas:
    WebhookEventType:
      description: Webhook event type that you can subscribe to and that Fintoro can deliver to your endpoint.
      type: string
      enum:
        - clients.created
        - clients.updated
        - clients.deleted
        - suppliers.created
        - suppliers.updated
        - suppliers.deleted
        - bank-accounts.created
        - bank-accounts.updated
        - bank-accounts.deleted
        - business-case-statuses.created
        - business-case-statuses.updated
        - business-case-statuses.deleted
        - business-cases.created
        - business-cases.updated
        - business-cases.deleted
        - contact-activity-logs.created
        - contact-activity-logs.updated
        - contact-activity-logs.deleted
        - price-list-items.created
