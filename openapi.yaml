    post:
      tags: [Zálohové faktúry]
      summary: Vytvoriť zálohovú faktúru
      operationId: createProforma
      description: |
        Vytvorí novú zálohovú faktúru.

        ### Odporúčaný flow

        Odporúčaný happy path je poslať `clientId` a `items`.

        Ak klienta ešte vo Fintoro nemáte alebo nechcete robiť samostatný krok na jeho vytvorenie, pošlite objekt `client` bez `clientId`. Backend sa pokúsi klienta dopárovať k existujúcemu záznamu a ak nič nenájde, vytvorí nového klienta.

        Ak pošlete `clientId` aj objekt `client`, objekt `client` sa správa ako sparse override snapshotu klienta pre túto konkrétnu zálohovú faktúru.

        ### Ako fungujú defaulty

        Väčšina dokladových polí je voliteľná. Backend ich vyhodnocuje v tomto poradí:

        1. explicitná hodnota z payloadu,
        2. klientské predvolené hodnoty,
        3. firemné document settings,
        4. systémový resolver.

        V praxi to znamená napríklad:

        - `number` a `numericalSeriesId` sa doplnia z primárneho číselného radu, ak ich nepošlete,
        - `variableSymbol` sa bez explicitnej hodnoty odvodí z finálneho čísla dokladu,
        - `bankAccountId` sa bez explicitnej hodnoty vezme z primárneho bankového účtu firmy,
        - `dueDateDays` sa môže dopočítať z klientských preferencií alebo z nastavenia dokladov firmy,
        - `deliveryMethodId`, `paymentMethodId`, `currencyId`, `languageId`, `qrTypeId`, `note` a `textAboveItems` sa môžu dopočítať z klienta alebo z firemných nastavení,
        - `issueDate` defaultuje na dnešný deň.

        ### Ako funguje client resolution

        Client resolution je striktne deterministický:

        - ak pošlete `clientId`, backend načíta klienta podľa ID v rámci,
        - ak `clientId` nepošlete, objekt `client` sa používa na dopárovanie alebo vytvorenie klienta,
        - ak pošlete `clientId` aj objekt `client`, objekt `client` sa použije iba ako snapshot override pre doklad.

        Matching prebieha deterministicky v tomto poradí:

        - pri firmách: `vatId`, potom `countryId + subjectId`, potom `name + email`, potom `name + street`,
        - pri fyzických osobách: `name + email`, potom `name + street`.

        ### Ako fungujú položky

        Položka môže byť vytvorená tromi spôsobmi:

        1. ako manuálna položka s vlastným názvom, jednotkou, cenou a DPH,
        2. cez `priceListItemId` a `quantity`,
        3. cez `priceListItemId` a sparse override vybraných polí, napríklad ceny alebo názvu.

        Ak pošlete zľavu bez `discountName`, backend doplní lokalizovaný názov zľavy podľa jazyka dokladu.

        Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého vytvorenia zálohovej faktúry.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProformaInput'
      responses:
        '201':
          description: Zálohová faktúra bola vytvorená.
