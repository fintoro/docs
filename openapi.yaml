      description: |-
        Aktualizuje existujúcu faktúru.

        ### Ako funguje update

        - Update používa rovnaký payload kontrakt a rovnaké defaulty ako create flow.
        - Musíte poslať buď `clientId`, alebo objekt `client`.
        - `items` sú povinné vždy.
        - Ak pole nepošlete, backend nedrží pôvodnú hodnotu z faktúry, ale vyrieši ho rovnako ako pri create flowe z payloadu, klientských predvolieb a nastavenia dokladov firmy.
        - Pri update položiek môžete poslať pôvodné `uuid` existujúcich riadkov faktúry. Tieto UUID máte k dispozícii v detaile faktúry. Backend ich používa na udržanie väzieb na skladové výdajky pri synchronizácii alokácií. Pri create flowe sa tieto UUID neposielajú, generuje ich backend.

        ### Chybové stavy

        - `422`, ak explicitne pošlete `clientId`, ktoré neexistuje alebo nepatrí firme.
        - `422`, ak explicitne pošlete `bankAccountId`, ktoré neexistuje alebo nepatrí firme.
        - `422`, ak payload neprejde business validáciou, napríklad pri nevalidných položkách faktúry.
