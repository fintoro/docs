      summary: Vytvoriť dobropis z faktúry
      operationId: createInvoiceCreditNote
      description: |
        Vytvorí dobropis priamo zo zvolenej faktúry.

        ### Kedy použiť tento endpoint

        Tento endpoint je DX shortcut pre bežný full-credit flow, keď už máte `invoiceId` a nechcete skladať celý payload ručne. Nenahrádza kanonický `POST /credit-notes`; ten je stále určený pre explicitný create flow s plným payloadom.

        ### Čo backend preberie zo zdrojovej faktúry

        - klienta vždy odvodí zo zvolenej faktúry,
        - prekopíruje položky ako záporné kreditné riadky vrátane skladových alokácií,
        - zachová bankový účet, menu, jazyk, spôsob úhrady, prenesenú daňovú povinnosť a document-level zľavu,
        - zachová `note`, `textAboveItems`, `constantSymbol` a `specificSymbol`, pokiaľ ich explicitne neoverride-nete tam, kde je to povolené.

        ### Defaulty a override polia

        - `issueDate` defaultuje na dnešný dátum.
        - `dueDate` defaultuje na finálny `issueDate`.
        - `deliveryDate` defaultuje na finálny `issueDate`.
        - Ak nepošlete `number`, backend vygeneruje číslo z primárneho číselného radu dobropisov. Ak pošlete `numericalSeriesId` bez `number`, číslo sa vygeneruje z tohto radu.
        - `variableSymbol` sa dopočíta server-side z finálneho čísla dobropisu.
        - Povolené overrides sú len polia definované v request schéme nižšie.

        Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého vytvorenia dobropisu.
