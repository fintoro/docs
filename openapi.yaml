          example: 12
        issueDate:
          description: Dátum vystavenia vo formáte `Y-m-d`. Musí byť po `2009-01-01` a pred dátumom o jeden rok v budúcnosti. Ak ho nepošlete, použije sa dnešný dátum.
          type: string
          format: date
          example: '2026-03-03'
        discountType:
          description: Typ zľavy na úrovni celého dokladu.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Hodnota zľavy na úrovni celého dokladu.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Príznak prenesenej daňovej povinnosti. Ak ho nepošlete, použije sa `false`.
          type: boolean
          example: false
        deliveryMethodId:
          type: integer
          description: "ID spôsobu dodania z [referenčnej tabuľky spôsobov dodania](/reference-tables#sposoby-dodania). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        paymentMethodId:
          type: integer
          description: "ID spôsobu úhrady z [referenčnej tabuľky spôsobov úhrady](/reference-tables#sposoby-uhrady). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        currencyId:
          type: integer
          description: "ID meny z [referenčnej tabuľky mien](/reference-tables#meny). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        languageId:
          type: integer
          description: "ID jazyka z [referenčnej tabuľky jazykov](/reference-tables#jazyky). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        note:
          description: Poznámka na doklade. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Ďakujeme za objednávku.
        textAboveItems:
          description: Text nad položkami. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Dakujeme za spoluprácu.
        items:
          description: Položky objednávky. Toto pole je povinné vždy. `uuid` ani `warehouseAllocations` sa pri objednávkach neposielajú.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OrderItemInput'
