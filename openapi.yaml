          description: ID existujúceho klienta. Toto je odporúčaný spôsob tvorby objednávky. Ak zároveň pošlete objekt `client`, použije sa ako sparse override snapshotu klienta pre tento konkrétny doklad.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse klientský payload. Ak pošlete `clientId`, slúži ako override snapshotu pre tento doklad. Ak `clientId` nepošlete, backend podľa týchto údajov klienta dopáruje alebo vytvorí.
          anyOf:
            - $ref: '#/components/schemas/OrderClientInput'
            - type: 'null'
