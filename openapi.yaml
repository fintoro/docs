      properties:
        number:
          description: Manuálne číslo cenovej ponuky. Ak ho nepošlete, backend ho vygeneruje z číselného radu. Ak pošlete `number`, nepošlite zároveň `numericalSeriesId`.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        clientId:
          description: ID existujúceho klienta. Toto je odporúčaný spôsob tvorby cenovej ponuky. Ak zároveň pošlete objekt `client`, použije sa ako sparse override snapshotu klienta pre tento konkrétny doklad.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse klientský payload. Ak pošlete `clientId`, slúži ako override snapshotu pre tento doklad. Ak `clientId` nepošlete, backend podľa týchto údajov klienta dopáruje alebo vytvorí.
          anyOf:
            - $ref: '#/components/schemas/QuotationClientInput'
            - type: 'null'
        businessCaseId:
          description: Voliteľné ID obchodného prípadu. Ak ho pošlete, musí patriť klientovi určenému cez finálny `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: ID číselného radu. Ak ho nepošlete a nepošlete ani `number`, použije sa primárny číselný rad pre cenové ponuky. Ak pošlete `numericalSeriesId`, nepošlite zároveň manuálne `number`.
          type: [integer, 'null']
          example: 12
        issueDate:
          description: Dátum vystavenia vo formáte `Y-m-d`. Musí byť po `2009-01-01` a pred dátumom o jeden rok v budúcnosti. Ak ho nepošlete, použije sa dnešný dátum.
          type: string
          format: date
          example: '2026-03-03'
        validityDate:
          description: Dátum platnosti vo formáte `Y-m-d`. Musí byť rovný alebo neskorší než finálny `issueDate`. Ak ho nepošlete, použije sa `issueDate + 30 dní`.
          type: [string, 'null']
          format: date
          example: '2026-04-02'
        discountType:
          description: Typ zľavy na úrovni celého dokladu.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Hodnota zľavy na úrovni celého dokladu.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Príznak prenesenej daňovej povinnosti. Ak ho nepošlete, použije sa `false`.
          type: boolean
          example: false
        currencyId:
          type: integer
          description: "ID meny z [referenčnej tabuľky mien](/reference-tables#meny). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        languageId:
          type: integer
          description: "ID jazyka z [referenčnej tabuľky jazykov](/reference-tables#jazyky). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        note:
          description: Poznámka na doklade. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Cenová ponuka platí 30 dní.
        textAboveItems:
          description: Text nad položkami. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Dakujeme za Váš záujem.
        items:
          description: Položky cenovej ponuky. Toto pole je povinné vždy. `uuid` ani `warehouseAllocations` sa pri cenových ponukách neposielajú.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/QuotationItemInput'
    QuotationUpdateInput:
      description: >-
        Payload pre aktualizáciu cenovej ponuky. Update používa rovnaké polia, rovnaké validačné pravidlá a rovnaké defaulty ako
        create flow. Musíte poslať buď `clientId`, alebo objekt `client`. Omitted polia sa nedoťahujú z aktuálnej cenovej ponuky;
        backend ich vyrieši rovnako ako pri create flowe.
      allOf:
        - $ref: '#/components/schemas/QuotationInput'
        - type: object
          properties:
            items:
              description: Položky cenovej ponuky. Toto pole je pri update povinné vždy.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/QuotationItemInput'
