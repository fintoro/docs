    InvoiceUpdateItemInput:
      description: >-
        Payload jednej položky faktúry pri update. Pravidlá sú rovnaké ako pri create, ale navyše môžete poslať pôvodné `uuid` existujúceho riadku faktúry. Toto UUID máte k dispozícii v detaile faktúry. Backend ho používa pri synchronizácii skladových alokácií a výdajok, aby vedel spárovať upravovaný riadok s pôvodným riadkom dokladu.
      allOf:
        - $ref: '#/components/schemas/InvoiceItemInput'
        - type: object
          properties:
            uuid:
              description: UUID pôvodného riadku faktúry, ktoré získate z detailu faktúry. Posielajte ho len pri update existujúcich položiek, keď chcete zachovať väzby na skladové pohyby a výdajky. UUID musí patriť položke aktuálne upravovanej faktúry.
              type: [string, 'null']
              format: uuid
              example: 6b1b8c9e-66e6-4fb5-b2db-6d7c7f0f8f19

    InvoiceUpdateInput:
      description: >-
        Payload pre aktualizáciu faktúry. Update používa rovnaké polia, rovnaké validačné pravidlá a rovnaké defaulty ako create flow. Musíte poslať buď `clientId`, alebo objekt `client`. Omitted polia sa nedoťahujú z aktuálnej faktúry; backend ich vyrieši rovnako ako pri create flowe. Jediný rozdiel oproti create je, že pri položkách môžete navyše posielať pôvodné `uuid` existujúcich riadkov faktúry.
      allOf:
        - $ref: '#/components/schemas/InvoiceInput'
        - type: object
          properties:
            proformaId:
              description: Voliteľné ID zálohovej faktúry, z ktorej sa má vytvoriť finálny stav faktúry. Pri update môže byť toto ID buď ešte nepriradené, alebo už naviazané na aktuálne upravovanú faktúru.
              type: [integer, 'null']
              example: 401
            orderId:
              description: Voliteľné ID objednávky, z ktorej sa má vytvoriť finálny stav faktúry. Pri update môže byť toto ID buď ešte nepriradené, alebo už naviazané na aktuálne upravovanú faktúru.
              type: [integer, 'null']
              example: 501
            quotationId:
              description: Voliteľné ID cenovej ponuky, z ktorej sa má vytvoriť finálny stav faktúry. Pri update môže byť toto ID buď ešte nepriradené, alebo už naviazané na aktuálne upravovanú faktúru.
              type: [integer, 'null']
              example: 601
            items:
              description: Položky faktúry. Toto pole je pri update povinné vždy. Ak pri existujúcej položke pošlete jej pôvodné `uuid` z detailu faktúry, backend vie zachovať väzby na skladové výdajky a synchronizovať zmenené alokácie na tom istom riadku.
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceUpdateItemInput'
    CreditNoteUpdateInput:
      description: >-
