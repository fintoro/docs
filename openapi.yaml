        - in: query
          name: clientId
          required: false
          description: Filter podľa klienta.
          schema:
            type: integer
          example: 101
        - in: query
          name: issueDateFrom
          required: false
          description: Dátum vystavenia od.
          schema:
            type: string
            format: date
          example: '2026-02-01'
        - in: query
          name: issueDateTo
          required: false
          description: Dátum vystavenia do.
          schema:
            type: string
            format: date
          example: '2026-02-28'
        - in: query
          name: validityDateFrom
          required: false
          description: Dátum platnosti od.
          schema:
            type: string
            format: date
          example: '2026-03-01'
        - in: query
          name: validityDateTo
          required: false
          description: Dátum platnosti do.
          schema:
            type: string
            format: date
          example: '2026-03-31'
        - in: query
          name: status
          required: false
          description: Filter podľa stavu cenovej ponuky.
          schema:
            type: string
            enum: [waiting, accepted, rejected]
          example: waiting
        - in: query
          name: totalFrom
          required: false
          description: Minimálna celková suma s DPH po zľavách.
          schema:
            type: number
            format: float
          example: 100
        - in: query
          name: totalTo
          required: false
          description: Maximálna celková suma s DPH po zľavách.
          schema:
            type: number
            format: float
          example: 1000
        - in: query
          name: withoutInvoice
          required: false
          description: Ak je `true`, vrátia sa len cenové ponuky, ktoré ešte nemajú naviazanú finálnu faktúru.
          schema:
            type: boolean
          example: true
        - in: query
          name: withoutProforma
          required: false
          description: Ak je `true`, vrátia sa len cenové ponuky, ktoré ešte nemajú naviazanú zálohovú faktúru.
          schema:
            type: boolean
          example: true
        - in: query
          name: withoutOrder
          required: false
          description: Ak je `true`, vrátia sa len cenové ponuky, ktoré ešte nemajú naviazanú objednávku.
          schema:
            type: boolean
          example: true
        - in: query
          name: sortBy
          required: false
          description: Pole pre triedenie.
          schema:
            type: string
            enum: [number, issueDate, validityDate, total, totalWithVat]
            default: issueDate
          example: validityDate
        - in: query
          name: sortDirection
          required: false
          description: Smer triedenia.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          example: desc
        - in: query
          name: perPage
          required: false
          description: Počet výsledkov na stránku.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 10
          example: 10
        - in: query
          name: page
          required: false
          description: Číslo stránky.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 2
      responses:
        '200':
          description: Paginovaný zoznam cenových ponúk v preview tvare.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
