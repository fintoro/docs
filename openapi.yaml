        - Klient dobropisu sa vždy preberá zo zvolenej zdrojovej faktúry; `clientId` neposielajte.
        - Tento endpoint nepodporuje inline `client` payload, client resolution ani automatické vytváranie klienta.
        - Výsledná celková suma dobropisu musí zostať záporná; ak payload vyprodukuje kladný doklad, endpoint vráti `422`.

        ### Payload kontrakt

        Na rozdiel od Fintoro API faktúr a zálohových faktúr ide o explicitný create flow bez smart defaultov. Pošlite kompletný business payload dokladu vrátane dátumov, bankového účtu, symbolov, meny a položiek.

        Ak používate skladové alokácie na položkách, backend ich spracuje ako príjemové pohyby naviazané na dobropis.

        Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého vytvorenia dobropisu.
