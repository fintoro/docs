                $ref: '#/components/schemas/Proforma'
        '422':
          description: Request payload neprešiel validačnými pravidlami alebo sa nedá spracovať kvôli business pravidlu.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              examples:
