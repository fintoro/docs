        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Bearer token vytvorený pre konkrétnu firmu v Integrácie → API.
  parameters:
    ClientId:
      name: client
      in: path
      required: true
      description: ID klienta.
      schema:
        type: integer
        example: 101
    SupplierId:
      name: supplier
      in: path
      required: true
      description: ID dodávateľa.
      schema:
        type: integer
        example: 151
    BusinessCaseStatusId:
      name: businessCaseStatus
      in: path
      required: true
      description: ID stavu obchodného prípadu.
      schema:
        type: integer
        example: 41
    BusinessCaseId:
      name: businessCase
      in: path
      required: true
      description: ID obchodného prípadu.
      schema:
        type: integer
        example: 501
    ContactActivityLogId:
      name: contactActivityLog
      in: path
      required: true
      description: ID kontaktnej aktivity.
      schema:
        type: integer
        example: 551
    BankAccountId:
      name: bankAccount
      in: path
      required: true
      description: ID bankového účtu.
      schema:
        type: integer
        example: 201
    WarehouseId:
      name: warehouse
      in: path
      required: true
      description: ID skladu.
      schema:
        type: integer
        example: 301
    WarehouseInboundReceiptId:
      name: warehouseInboundReceipt
      in: path
      required: true
      description: ID skladovej príjemky.
      schema:
        type: integer
        example: 901
    WarehouseOutboundReceiptId:
      name: warehouseOutboundReceipt
      in: path
      required: true
      description: ID skladovej výdajky.
      schema:
        type: integer
        example: 951
    PriceListItemId:
      name: priceListItem
      in: path
      required: true
      description: ID skladovej alebo cenníkovej položky.
      schema:
        type: integer
        example: 701
    WebhookSubscriptionId:
      name: webhookSubscription
      in: path
      required: true
      description: ID odberu webhookov.
      schema:
        type: integer
        example: 801
    InvoiceId:
      name: invoice
      in: path
      required: true
      description: ID faktúry.
      schema:
        type: integer
        example: 301
    CreditNoteId:
      name: creditNote
      in: path
      required: true
      description: ID dobropisu.
      schema:
        type: integer
        example: 351
    NumericalSeriesId:
      name: numericalSeries
      in: path
      required: true
      description: ID číselného radu.
      schema:
        type: integer
        example: 901
    DocumentPaymentId:
      name: documentPayment
      in: path
      required: true
      description: ID úhrady dokladu.
      schema:
        type: integer
        example: 801
    ProformaId:
      name: proforma
      in: path
      required: true
      description: ID zálohovej faktúry.
      schema:
        type: integer
        example: 401
    OrderId:
      name: order
      in: path
      required: true
      description: ID objednávky.
      schema:
        type: integer
        example: 501
    QuotationId:
      name: quotation
      in: path
      required: true
      description: ID cenovej ponuky.
      schema:
        type: integer
        example: 601
    SubjectId:
      name: subject
      in: path
      required: true
      description: ID subjektu z referenčného registra.
      schema:
        type: integer
        example: 12345678
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Voliteľný identifikátor requestu pre bezpečné retry. Použite unikátnu hodnotu pre každé create volanie, ktoré chcete vedieť bezpečne zopakovať.
      schema:
        type: string
        example: invoice-create-2026-03-03-001
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Voliteľný jazyk response. Lokalizuje systémové názvy v lookupoch, v súvisiacich objektoch v odpovediach aj vo validačných chybách. User-generated dáta tým nemeníte.
      schema:
        type: string
        example: en
  headers:
    XRequestId:
      description: Unikátny identifikátor requestu pre traceovanie, audit a support diagnostiku.
      schema:
        type: string
        example: req_public_api_01
    ContentLanguage:
      description: Jazyk vybraný pre request podľa headera `Accept-Language`.
      schema:
        type: string
        example: en
  responses:
    Unauthorized:
      description: Chýba, je neplatný alebo bol revokovaný bearer token pre Fintoro API.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthenticated.
    NotFound:
      description: Požadovaný zdroj sa nenašiel.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: No query results for model.
    Forbidden:
      description: Prístup k zdroju nie je povolený alebo scope.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: This action is unauthorized.
    ValidationError:
      description: Request payload alebo query parametre neprešli validačnými pravidlami.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: The given data was invalid.
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
    TooManyRequests:
      description: Firma prekročila Fintoro API rate limit. Táto 429 odpoveď nesie tie isté `X-RateLimit-Limit` a `X-RateLimit-Remaining` hlavičky ako ostatné throttled odpovede a navyše pridáva `Retry-After` a `X-RateLimit-Reset`. Ak potrebujete vyšší limit, kontaktujte info@fintoro.sk pre individuálne enterprise nastavenie.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        X-RateLimit-Limit:
          description: Maximálny počet requestov povolený pre firmu v aktuálnom 60-sekundovom okne. Túto hlavičku vraciame na všetkých throttled odpovediach, nielen pri 429.
          schema:
            type: integer
            example: 120
        X-RateLimit-Remaining:
          description: Počet requestov, ktoré ešte firme ostávajú v aktuálnom 60-sekundovom okne. Túto hlavičku vraciame na všetkých throttled odpovediach, nielen pri 429.
          schema:
            type: integer
            example: 0
        Retry-After:
          description: Počet sekúnd, po ktorých môžete request bezpečne zopakovať. Túto hlavičku posielame len pri 429.
          schema:
            type: integer
            example: 60
        X-RateLimit-Reset:
          description: Unix timestamp, kedy sa aktuálne rate-limit okno resetuje. Túto hlavičku posielame len pri 429.
          schema:
            type: integer
            example: 1774810800
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Too Many Attempts.
    InternalServerError:
      description: Nastala neočakávaná interná chyba. Tento stav by sa nemal vyskytovať pri bežnej prevádzke a automaticky ho reportujeme.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Server Error
    ServiceUnavailable:
      description: API je dočasne nedostupné počas riadenej údržby. Plánovaný výpadok oznamujeme minimálne 24 hodín vopred.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Content-Language:
          $ref: '#/components/headers/ContentLanguage'
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Service Unavailable
  schemas:
    WebhookEventType:
      description: Typ webhook udalosti, ktorú môžete subscribnuť a ktorú Fintoro následne doručuje na Váš endpoint.
      type: string
      enum:
        - clients.created
        - clients.updated
        - clients.deleted
        - suppliers.created
        - suppliers.updated
        - suppliers.deleted
        - bank-accounts.created
        - bank-accounts.updated
        - bank-accounts.deleted
        - business-case-statuses.created
        - business-case-statuses.updated
        - business-case-statuses.deleted
        - business-cases.created
        - business-cases.updated
        - business-cases.deleted
        - contact-activity-logs.created
        - contact-activity-logs.updated
        - contact-activity-logs.deleted
        - price-list-items.created
        - price-list-items.updated
        - price-list-items.deleted
        - warehouses.created
        - warehouses.updated
        - warehouses.deleted
        - warehouse-inbound-receipts.created
        - warehouse-inbound-receipts.updated
        - warehouse-inbound-receipts.deleted
        - warehouse-outbound-receipts.created
        - warehouse-outbound-receipts.updated
        - warehouse-outbound-receipts.deleted
        - invoices.created
        - invoices.updated
        - invoices.deleted
        - invoices.paid
        - credit-notes.created
        - credit-notes.updated
        - credit-notes.deleted
        - credit-notes.paid
        - received-invoices.paid
        - received-receipts.paid
        - proformas.created
        - proformas.updated
        - proformas.deleted
        - proformas.paid
        - orders.created
        - orders.updated
        - orders.deleted
        - quotations.created
        - quotations.updated
        - quotations.deleted
        - document-payments.created
        - document-payments.deleted
      example: invoices.updated
    WebhookSubscription:
      description: Jeden odber webhookov aktuálnej firmy.
      type: object
      properties:
        id:
          description: Interné ID odberu webhookov.
          type: integer
          example: 801
        companyId:
          description: ID firmy, ku ktorej subscription patrí.
          type: integer
          example: 15
        name:
          description: Voliteľný interný názov subscription pre Vašu orientáciu.
          type: [string, 'null']
          maxLength: 255
          example: ERP sync
        url:
          description: HTTPS URL, na ktorú Fintoro doručuje webhook requesty. Hostname musí smerovať na verejnú IP adresu; `localhost`, `.local`, privátne rozsahy a rezervované adresy backend odmietne.
          type: string
          format: uri
          maxLength: 2048
          example: https://example.com/webhooks/fintoro
        isActive:
          description: Ak je `true`, subscription je aktívny a môže prijímať delivery requesty.
          type: boolean
          example: true
        subscribedEvents:
          description: Zoznam event typov, ktoré sa majú pre tento subscription doručovať.
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
          example:
            - invoices.created
            - invoices.updated
        lastSuccessAt:
          description: ISO 8601 čas posledného úspešného doručenia, ak už k nemu došlo.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:04:05Z'
        lastFailureAt:
          description: ISO 8601 čas posledného neúspešného doručenia, ak už k nemu došlo.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:05:42Z'
        disabledAt:
          description: ISO 8601 čas deaktivácie subscription. V tejto verzii ostáva `null`, pokiaľ subscription manuálne nevypnete alebo budúce verzie nepridajú auto-disable flow.
          type: [string, 'null']
          format: date-time
          example: null
        disabledReason:
          description: Dôvod deaktivácie subscription, ak je známy.
          type: [string, 'null']
          example: null
        createdAt:
          description: ISO 8601 čas vytvorenia subscription.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T14:59:12Z'
        updatedAt:
          description: ISO 8601 čas poslednej zmeny subscription.
          type: [string, 'null']
          format: date-time
          example: '2026-03-18T15:01:33Z'
    WebhookSubscriptionWithSecret:
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          properties:
            plainTextSecret:
              description: Secret na podpisovanie zobrazený iba pri create alebo rotate-secret flowe v otvorenej podobe. Bezpečne si ho uložte; v ďalších odpovediach sa už nevracia.
              type: string
              example: whsec_fintoro_8b5d7c9f4f6549f7a3e8c4fd5f55ab91
    WebhookSubscriptionInput:
      description: Payload pre create alebo update odberu webhookov. Používajte iba HTTPS endpoint, ktorý vie prijať JSON `POST` requesty od Fintoro a ktorého hostname sa resolvne na verejnú IP adresu.
      type: object
      required:
        - url
        - isActive
        - subscribedEvents
      properties:
        name:
          description: Voliteľný interný názov subscription pre Vašu orientáciu vo Fintoro alebo v integračnom tíme.
          type: [string, 'null']
          maxLength: 255
          example: ERP sync
        url:
          description: HTTPS URL prijímača webhookov. Backend odmietne nezabezpečené `http://` adresy, endpointy s používateľským menom alebo heslom a hosty, ktoré sa resolvnu na `localhost`, `.local`, privátne, loopback, link-local alebo iné rezervované IP adresy. Rovnaká kontrola prebehne znovu aj tesne pred samotným odoslaním webhooku.
          type: string
          format: uri
          maxLength: 2048
          example: https://example.com/webhooks/fintoro
        isActive:
          description: Určuje, či je subscription aktívny hneď po uložení.
          type: boolean
          example: true
        subscribedEvents:
          description: Zoznam event typov, ktoré má Fintoro na tento endpoint posielať. Pole musí obsahovať aspoň jednu udalosť.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WebhookEventType'
          example:
            - invoices.created
            - invoices.updated
    Country:
      description: Krajina dostupná v lookup endpointoch Fintoro API a vo vnorených objektoch, kde sa krajina vracia priamo v response.
      type: object
      properties:
        id:
          description: Stabilné ID krajiny používané v API.
          type: integer
          example: 703
        name:
          description: Lokalizovaný názov krajiny. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Slovensko
        code:
          description: Dvojpísmenový ISO kód krajiny.
          type: string
          example: SK
        eu:
          description: Informácia, či krajina patrí do Európskej únie.
          type: boolean
          example: true
    Language:
      description: Jazyk dostupný v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID jazyka používané v API.
          type: integer
          example: 1
        name:
          description: Lokalizovaný názov jazyka. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Slovenčina
        code:
          description: Krátky jazykový kód.
          type: string
          example: sk
    Currency:
      description: Mena dostupná v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID meny používané v API.
          type: integer
          example: 1
        symbol:
          description: ISO alebo interný symbol meny.
          type: string
          example: EUR
        name:
          description: Lokalizovaný názov meny. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Euro
        mark:
          description: Skrátená značka meny zobrazovaná vo Fintoro.
          type: string
          example: €
    DeliveryMethod:
      description: Spôsob dodania dostupný v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID spôsobu dodania používané v API.
          type: integer
          example: 1
        name:
          description: Lokalizovaný názov spôsobu dodania. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Nezadaný
    PaymentMethod:
      description: Spôsob úhrady dostupný v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID spôsobu úhrady používané v API.
          type: integer
          example: 1
        name:
          description: Lokalizovaný názov spôsobu úhrady. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Platba prevodom
    DocumentPayment:
      description: Jedna úhrada public dokladu.
      type: object
      properties:
        id:
          description: Interné ID úhrady.
          type: integer
          example: 801
        documentType:
          description: Typ dokladu, ku ktorému úhrada patrí.
          type: string
          enum: [invoice, proforma, credit-note]
          example: invoice
        documentId:
          description: ID dokladu, ku ktorému úhrada patrí.
          type: integer
          example: 301
        paymentMethod:
          description: Použitý spôsob úhrady ako vnorený lookup objekt.
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          description: Mena úhrady ako vnorený lookup objekt.
          $ref: '#/components/schemas/Currency'
        paymentDate:
          description: Dátum úhrady vo formáte `Y-m-d`.
          type: string
          format: date
          example: '2026-03-07'
        amount:
          description: Suma úhrady v mene úhrady.
          type: number
          format: float
          example: 15.5
        currencyRate:
          description: Kurz meny úhrady voči EUR. Ak je mena úhrady `EUR`, backend vždy vráti `1.0`.
          type: number
          format: float
          example: 1.0
        receiptInvoice:
          description: Preview daňového dokladu k prijatej platbe, ak existuje.
          anyOf:
            - $ref: '#/components/schemas/InvoicePreview'
            - type: 'null'
    DocumentPaymentInput:
      description: >-
        Payload pre vytvorenie úhrady dokladu. Podporované sú len dokumenty `invoice`, `proforma` a `credit-note`, pričom cieľový doklad
        musí byť dostupný pre token.
      type: object
      required:
        - documentType
        - documentId
      properties:
        documentType:
          description: Typ dokladu, ku ktorému úhradu vytvárate.
          type: string
          enum: [invoice, proforma, credit-note]
          example: invoice
        documentId:
          description: ID dokladu, ku ktorému úhradu vytvárate.
          type: integer
          example: 301
        currencyId:
          description: "Voliteľné ID meny z [referenčnej tabuľky mien](/reference-tables#meny). Ak ho nepošlete, použije sa mena zo zdrojového dokladu."
          type: integer
          example: 1
        currencyRate:
          description: Kurz meny úhrady voči EUR. Ak ho nepošlete, systém ho dopočíta z finálneho `paymentDate` kurzom z predchádzajúceho dňa. Ak ho pošlete pre inú menu než `EUR`, použije sa presne táto override hodnota. Ak je finálna mena úhrady `EUR`, backend vždy uloží `1.0`.
          type: number
          format: float
          example: 1.0
        paymentDate:
          description: Dátum úhrady vo formáte `Y-m-d`. Ak ho nepošlete, použije sa dnešný dátum.
          type: string
          format: date
          example: '2026-03-07'
        paymentMethodId:
          description: "Voliteľné ID spôsobu úhrady z [referenčnej tabuľky spôsobov úhrady](/reference-tables#sposoby-uhrady). Ak ho nepošlete, použije sa spôsob úhrady zo zdrojového dokladu."
          type: integer
          example: 1
        amount:
          description: Suma úhrady v mene úhrady. Ak ju nepošlete, použije sa aktuálna zostávajúca suma `toBePaid` zo zdrojového dokladu. Backend akceptuje aj záporné sumy, napríklad pri vysporiadaní dobropisu.
          type: number
          format: float
          example: 15.5
    DocumentMailInput:
      description: >-
        Payload pre odoslanie podporovaného dokladu emailom. Cieľový doklad sa určuje cez kombináciu `documentType` + `documentId`
        a musí byť dostupný pre token.
      type: object
      required:
        - documentType
        - documentId
        - to
        - type
      properties:
        documentType:
          description: Typ dokladu, ktorý chcete odoslať emailom.
          type: string
          enum: [invoice, proforma, order, credit-note, quotation]
          example: invoice
        documentId:
          description: ID podporovaného dokladu patriaceho.
          type: integer
          example: 301
        to:
          description: Pole jednej alebo viacerých cieľových e-mailových adries.
          type: array
          minItems: 1
          items:
            type: string
            format: email
            example: billing@example.test
          example:
            - billing@example.test
            - owner@example.test
        body:
          description: Voliteľný vlastný text vložený do tela emailu.
          type: [string, 'null']
          maxLength: 1000
          example: V prílohe nájdete doklad.
        type:
          description: >-
            Typ odosielaného mailu. Pri `invoice` a `proforma` ovplyvňuje predmet a typ šablóny; pri `order`, `credit-note`
            a `quotation` sa momentálne správa rovnako ako `regular`.
          type: string
          enum: [regular, reminder, overdue_reminder, confirmation]
          example: reminder
    QrType:
      description: QR typ dostupný v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID QR typu používané v API.
          type: integer
          example: 1
        name:
          description: Lokalizovaný názov QR typu. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: Negenerovať
    Unit:
      description: Jednotka dostupná v lookup endpointoch Fintoro API.
      type: object
      properties:
        id:
          description: Stabilné ID jednotky používané v API.
          type: integer
          example: 1
        name:
          description: Lokalizovaný názov jednotky. Ak pošlete `Accept-Language`, backend podľa neho preloží systémový label.
          type: string
          example: ks
    Subject:
      description: Subjekt z referenčného registra. Typicky ho použijete ako podklad pri vytváraní klienta.
      type: object
      properties:
        id:
          description: IČO klienta alebo firmy. Pre slovenské subjekty túto hodnotu zvyčajne viete nájsť aj cez referenčný register subjektov.
          type: integer
          example: 12345678
        name:
          description: Obchodné meno alebo názov subjektu.
          type: string
