              schema:
                type: object
                properties:
                  data:
                    description: Celý zoznam spôsobov úhrady dostupných v tejto verzii API.
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /qr-types:
    get:
      tags: [Lookupy]
      summary: Zoznam QR typov
      operationId: listQrTypes
      description: Vráti fixný číselník QR typov. Endpoint nepodporuje filtrovanie ani stránkovanie a vracia celý dataset. ID QR typov sú stabilné v rámci tejto verzie API a nájdete ich aj v [referenčnej tabuľke QR typov](/reference-tables#qr-typy). Názvy sa dajú lokalizovať cez `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
