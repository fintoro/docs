  /document-payments:
    get:
      tags: [Úhrady dokladov]
      summary: Zoznam úhrad dokladu
      operationId: listDocumentPayments
      description: Vráti zoznam úhrad konkrétneho public dokladu. Zoznam je nefiltrovaný a nepaginuje sa; vždy vracia všetky úhrady daného dokladu v poradí od najnovšej.
      parameters:
        - in: query
          name: documentType
          required: true
          description: Typ dokladu, pre ktorý chcete úhrady načítať. Podporované sú len `invoice`, `proforma` a `credit-note`.
          schema:
            type: string
            enum: [invoice, proforma, credit-note]
          example: invoice
        - in: query
          name: documentId
          required: true
          description: ID dokladu patriaceho.
          schema:
            type: integer
          example: 301
      responses:
        '200':
          description: Zoznam úhrad dokladu.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Zoznam úhrad vybraného dokladu.
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentPayment'
        '422':
          description: Query parametre neprešli validačnými pravidlami.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags: [Úhrady dokladov]
      summary: Vytvoriť úhradu dokladu
      operationId: createDocumentPayment
      description: |
        Vytvorí novú úhradu pre public doklad.

        ### Podporované typy dokladov

        Endpoint podporuje len `invoice`, `proforma` a `credit-note`.

        ### Business správanie

        - Úhrada sa vždy viaže na konkrétny doklad cez kombináciu `documentType` + `documentId`.
        - Minimálny create payload je len `documentType` + `documentId`; ostatné polia môžete vynechať a server ich dopočíta.
        - Ak `paymentDate` nepošlete, použije sa dnešný dátum.
        - Ak `paymentMethodId` nepošlete, použije sa spôsob úhrady zo zdrojového dokladu.
        - Ak `currencyId` nepošlete, použije sa mena zo zdrojového dokladu.
        - Ak `amount` nepošlete, použije sa aktuálna zostávajúca suma `toBePaid` zo zdrojového dokladu.
        - Ak `currencyRate` nepošlete, systém ho odvodí z finálneho `paymentDate` kurzom z predchádzajúceho dňa.
        - Ak pošlete `currencyRate` pre inú menu než `EUR`, použije sa presne táto override hodnota.
        - Ak je finálna mena úhrady `EUR`, backend vždy uloží a vráti `currencyRate = 1.0`, aj keď pošlete inú hodnotu.
        - Pri vytvorení sa prepočíta stav úhrady dokladu rovnako ako vo web a mobile flowe.
        - Ak pošlete úhradu pre proformu a neskôr k nej vytvoríte daňový doklad k prijatej platbe, response úhrady vie obsahovať aj `receiptInvoice`.

        Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého vytvorenia úhrady.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentPaymentInput'
      responses:
        '201':
          description: Úhrada bola vytvorená.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
              description: Pôvodný idempotency key, ak bol poslaný v requeste.
              schema:
                type: string
            Idempotency-Status:
              description: '`Original` pri prvom spracovaní alebo `Repeated` pri vrátení pôvodnej odpovede.'
              schema:
                type: string
                enum: [Original, Repeated]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPayment'
        '422':
          description: Request payload neprešiel validačnými pravidlami alebo business pravidlu úhrady.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  error:
                    type: [string, 'null']
                    example: Idempotency-Key reused with different request payload
                  errors:
                    type: [object, 'null']
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
