      description: Vráti fixný číselník spôsobov úhrady. Endpoint nepodporuje filtrovanie ani stránkovanie a vracia celý dataset. ID spôsobov úhrady sú stabilné v rámci tejto verzie API a nájdete ich aj v [referenčnej tabuľke spôsobov úhrady](/reference-tables#sposoby-uhrady). Názvy sa dajú lokalizovať cez `Accept-Language`.
      parameters:
