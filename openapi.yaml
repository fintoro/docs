  /units:
    get:
      tags: [Lookupy]
      summary: Zoznam jednotiek
      operationId: listUnits
      description: Vráti fixný číselník jednotiek. Endpoint nepodporuje filtrovanie ani stránkovanie a vracia celý dataset. ID jednotiek sú stabilné v rámci tejto verzie API a nájdete ich aj v [referenčnej tabuľke jednotiek](/reference-tables#jednotky). Názvy sa dajú lokalizovať cez `Accept-Language`.
      parameters:
