        constantSymbol:
          description: Konštantný symbol s dĺžkou 1 až 4 číslic.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999
          example: 308
        specificSymbol:
          description: Špecifický symbol s dĺžkou 1 až 10 číslic.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999999999
          example: 55
        discountType:
          description: Typ zľavy na úrovni celého dokladu.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Hodnota zľavy na úrovni celého dokladu.
          type: [number, 'null']
          format: float
          example: 10.0
        transferTaxLiability:
          description: Príznak prenesenej daňovej povinnosti.
          type: boolean
          example: false
        paymentMethodId:
          type: integer
          description: "ID spôsobu úhrady z [referenčnej tabuľky spôsobov úhrady](/reference-tables#sposoby-uhrady)."
          example: 1
        currencyId:
          type: integer
          description: "ID meny z [referenčnej tabuľky mien](/reference-tables#meny)."
          example: 1
        currencyRate:
