            schema:
              $ref: '#/components/schemas/DocumentMailInput'
      responses:
        '202':
          description: Požiadavka na odoslanie dokladu bola prijatá.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
