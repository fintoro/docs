  /clients:
    get:
      tags: [Klienti]
      summary: Zoznam klientov
      operationId: listClients
      description: Vráti klientov. Endpoint je vhodný na synchronizáciu klientov do externého systému alebo vlastného frontendu a podporuje základné fulltextové vyhľadávanie, filtrovanie a triedenie.
      parameters:
        - name: search
          in: query
          required: false
          description: Fulltextové vyhľadávanie podľa názvu, mesta, PSČ alebo krajiny.
          schema:
            type: string
            example: bratislava
        - name: sortBy
          in: query
          required: false
          description: Pole, podľa ktorého sa majú klienti zoradiť.
          schema:
            type: string
            enum: [name, city, zip, countryId, createdAt, updatedAt]
            example: name
            default: name
        - name: sortDirection
          in: query
          required: false
          description: Smer zoradenia.
          schema:
            type: string
            enum: [asc, desc]
            example: desc
            default: asc
        - name: type
          in: query
          required: false
          description: Filter podľa typu klienta.
          schema:
            type: string
            enum: [person, company]
            example: company
        - name: subjectId
          in: query
          required: false
          description: Filter podľa IČO klienta alebo firmy.
          schema:
            type: string
            example: '12345678'
        - name: taxId
          in: query
          required: false
          description: Filter podľa DIČ klienta alebo firmy.
          schema:
            type: string
            example: '2020123456'
        - name: vatId
          in: query
          required: false
          description: Filter podľa IČ DPH klienta alebo firmy.
          schema:
            type: string
            example: SK2020123456
        - name: countryId
          in: query
          required: false
          description: "Filter podľa fakturačnej krajiny klienta z [referenčnej tabuľky krajín](/reference-tables#krajiny)."
          schema:
            type: integer
            example: 703
      responses:
        '200':
          description: Zoznam klientov.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Zoznam klientov.
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags: [Klienti]
      summary: Vytvoriť klienta
      operationId: createClient
      description: Vytvorí nového klienta. V requeste posielate business údaje klienta a voliteľné klientské predvolené hodnoty, ktoré sa ukladajú pri klientovi a pri tvorbe nových dokladov sa používajú ako fallback predvolené hodnoty, ak explicitnú hodnotu nepošlete v payloade. Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého vytvorenia klienta.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreateInput'
      responses:
        '201':
          description: Klient bol vytvorený.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Key:
              description: Pôvodný idempotency key, ak bol poslaný v requeste.
              schema:
                type: string
            Idempotency-Status:
              description: '`Original` pri prvom spracovaní alebo `Repeated` pri vrátení pôvodnej odpovede.'
              schema:
                type: string
                enum: [Original, Repeated]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '422':
          description: Idempotency key bol znovu použitý s iným payloadom.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Idempotency-Key reused with different request payload
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
