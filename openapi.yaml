        textAboveItems:
          description: Text nad položkami.
          type: [string, 'null']
          maxLength: 3000
          example: Dobropisujeme časť pôvodného plnenia.
        items:
          description: Položky dobropisu. Výsledný doklad musí mať zápornú celkovú sumu.
