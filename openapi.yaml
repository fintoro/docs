      tags: [Dokladové e-maily]
      summary: Odoslať doklad emailom
      operationId: sendDocumentMail
      description: |
        Odošle podporovaný public doklad emailom.

        ### Podporované typy dokladov

        Endpoint podporuje `invoice`, `proforma`, `order`, `credit-note` a `quotation`.

        ### Business správanie

        - Cieľový doklad sa určuje cez kombináciu `documentType` + `documentId`.
        - Pole `to` akceptuje pole jednej alebo viacerých e-mailových adries.
        - Pole `type` je povinné kvôli jednotnému kontraktu. Pri `invoice` a `proforma` ovplyvňuje predmet a typ mailu (`regular`, `reminder`, `overdue_reminder`, `confirmation`). Pri `order`, `credit-note` a `quotation` sa aktuálne správa rovnako ako bežné odoslanie.
        - Endpoint nevracia response body; úspech potvrdzuje status `202 Accepted`.

        Ak pošlete `Idempotency-Key`, rovnaký key s rovnakým payloadom vráti pôvodnú odpoveď bez druhého odoslania emailu.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
