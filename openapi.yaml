    OrderItemInput:
      description: >-
        Payload jednej položky objednávky. Podporované sú tri režimy: manuálna položka, `priceListItemId + quantity`, alebo
        `priceListItemId` s čiastočnými override poľami. Povinné je vždy `quantity`. Ak nepošlete `priceListItemId`, musíte poslať
        aj `name`, `unitPrice` a `vatRate`. `unitId` je voliteľné; ak ho pri manuálnej položke nepošlete, backend použije jednotku
        `1` (`ks` / `Unit::Piece`). Ak `priceListItemId` pošlete, backend si z cenníkovej položky vie dopočítať názov, jednotku,
        cenu a sadzbu DPH; payload potom slúži len ako sparse override.
      type: object
      required: [quantity]
      anyOf:
        - required: [priceListItemId]
        - required: [name, unitPrice, vatRate]
      properties:
        name:
          description: Názov položky. Pri manuálnej položke je povinný. Pri použití `priceListItemId` môže slúžiť ako override názvu z cenníka.
          type: [string, 'null']
          maxLength: 255
          example: Konzultácia
        description:
          description: Voliteľný popis položky. Pri `priceListItemId` môže prepísať alebo doplniť popis z cenníkovej položky.
          type: [string, 'null']
          maxLength: 1000
          example: Mesačný balík konzultácií
        unitPrice:
          description: Jednotková cena bez DPH. Pri manuálnej položke je povinná. Pri `priceListItemId` môže prepísať cenu načítanú z cenníka.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 100.0
        unitId:
          description: "Voliteľné ID jednotky z [referenčnej tabuľky jednotiek](/reference-tables#jednotky). Pri manuálnej položke, kde ho nepošlete, backend použije jednotku `1` (`ks` / `Unit::Piece`). Pri `priceListItemId` môže prepísať jednotku z cenníkovej položky."
          type: [integer, 'null']
          example: 1
        quantity:
          description: Množstvo položky. Toto pole je povinné vždy, bez ohľadu na to, či ide o manuálnu položku alebo o položku z cenníka.
          type: number
          format: float
          minimum: 0.00001
          maximum: 1000000
          example: 2.0
        vatRate:
          description: Sadzba DPH v percentách. Pri manuálnej položke je povinná. Pri `priceListItemId` môže prepísať sadzbu z cenníkovej položky.
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 23
          example: 20.0
        discountType:
          description: Typ zľavy na úrovni položky. Povolené hodnoty sú `percentage` a `fixed`.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Hodnota zľavy na úrovni položky. Ak pošlete `discountType`, musíte poslať aj toto pole.
          type: [number, 'null']
          format: float
          minimum: -10000000000000
          maximum: 10000000000000
          example: 10.0
        discountName:
          description: Názov zľavy na úrovni položky. Ak ho pri `discountType` a `discountValue` nepošlete, backend doplní lokalizované `Zľava` podľa jazyka dokladu.
          type: [string, 'null']
          maxLength: 255
          example: Vernostná zľava
        priceListItemId:
          description: ID cenníkovej položky. Ak ho pošlete, backend vie z tejto položky hydratovať názov, jednotku, cenu a sadzbu DPH a payload môže slúžiť len ako sparse override.
          type: [integer, 'null']
          example: 501
    OrderClientInput:
      description: >-
        Sparse klientský payload používaný pri tvorbe alebo úprave objednávky. Ak pošlete `clientId`, tento objekt slúži ako
