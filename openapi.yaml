  /numerical-series:
    get:
      tags: [Číselné rady]
      summary: Zoznam číselných radov
      operationId: listNumericalSeries
      description: Vráti číselné rady používané pri tvorbe public dokumentov. Endpoint nepoužíva stránkovanie; vracia celý relevantný dataset pre podporovaný document typ zadaný v povinnom query parametri `documentType`. Podporované hodnoty sú `invoice`, `proforma`, `credit-note`, `order` a `quotation`. Okrem interného počítadla `nextNumber` response vracia aj `nextDocumentNumber` a `nextVariableSymbol`, takže integrátor vie dopredu zistiť, aké číslo dokladu a variabilný symbol z konkrétneho radu vzniknú.
      parameters:
        - in: query
          name: documentType
          required: true
          description: Povinný document typ, pre ktorý sa má vrátiť relevantný dataset číselných radov.
          schema:
            type: string
            enum: [invoice, proforma, credit-note, order, quotation]
          example: invoice
      responses:
        '200':
          description: Zoznam číselných radov.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Celý zoznam číselných radov pre zadaný document typ.
                    type: array
                    items:
                      $ref: '#/components/schemas/NumericalSeries'
        '422':
          description: Query parameter neprešiel validačnými pravidlami.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The given data was invalid.
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /numerical-series/{numericalSeries}:
    parameters:
      - $ref: '#/components/parameters/NumericalSeriesId'
    get:
      tags: [Číselné rady]
      summary: Detail číselného radu
      operationId: showNumericalSeries
      description: Vráti detail jedného číselného radu v rovnakom tvare ako list endpoint. Endpoint je vhodný vtedy, keď si chcete uložiť konkrétne `numericalSeriesId` a neskôr si ho overiť alebo znovu načítať pred vytvorením dokladu.
      responses:
        '200':
          description: Detail jedného číselného radu.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericalSeries'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /subjects:
    get:
      tags: [Subjekty]
      summary: Vyhľadávanie subjektov
      operationId: searchSubjects
