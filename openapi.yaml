        - $ref: '#/components/schemas/InvoiceClientInput'
    OrderInput:
      description: >-
        Payload pre vytvorenie objednávky. V bežnom prípade stačí poslať `clientId` a `items`; ostatné polia môže backend dopočítať.
        Musíte poslať buď `clientId`, alebo objekt `client`.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manuálne číslo objednávky. Ak ho nepošlete, backend ho vygeneruje z číselného radu. Ak pošlete `number`, nepošlite zároveň `numericalSeriesId`.
