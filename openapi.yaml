        - name: searchQuery
          in: query
          required: true
          description: Hľadaný reťazec. Môže to byť názov subjektu alebo IČO. Minimum sú 3 znaky.
          schema:
            type: string
            minLength: 3
            example: acme
        - name: legalForm
          in: query
          required: false
          description: Voliteľný filter podľa právnej formy, ak chcete výsledky zúžiť len na firmy alebo živnostníkov.
          schema:
            type: string
            enum: [freelancer, company]
            example: company
        - name: limit
          in: query
          required: false
          description: Maximálny počet výsledkov, ktoré endpoint vráti.
          schema:
            type: integer
            minimum: 1
            maximum: 20
            example: 5
      responses:
        '200':
          description: Vracia zodpovedajúce subjekty z referenčného registra.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
