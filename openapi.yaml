    InvoiceClientInput:
      description: >-
        Sparse klientský payload používaný pri tvorbe alebo úprave faktúry. Ak pošlete `clientId`, tento objekt slúži ako voliteľný override snapshotu klienta iba pre konkrétny doklad. Ak `clientId` nepošlete, backend sa podľa tohto objektu pokúsi nájsť existujúceho klienta alebo vytvoriť nového.
      type: object
      properties:
        name:
          description: Názov firmy alebo meno osoby. Ak `clientId` neposielate, toto pole je povinné.
          type: string
          maxLength: 255
          example: Acme s.r.o.
        type:
          description: Typ klienta. Povolené hodnoty sú `person` a `company`. Ak ho nepošlete, backend ho dopočíta z identifikačných údajov.
          type: string
          enum: [person, company]
          example: company
        subjectId:
          description: IČO klienta alebo firmy.
          type: [string, 'null']
          maxLength: 40
          example: '12345678'
        taxId:
          description: DIČ klienta alebo firmy.
          type: [string, 'null']
          maxLength: 20
          example: '2020123456'
        vatId:
          description: IČ DPH klienta alebo firmy.
          type: [string, 'null']
          maxLength: 20
          example: SK2020123456
        isVatPayer:
          description: Voliteľná informácia, či je klient platca DPH. Ak ju nepošlete a vyplníte `vatId`, backend ju dopočíta automaticky.
          type: boolean
          example: true
        email:
          description: Kontaktný e-mail klienta.
          type: [string, 'null']
          format: email
          maxLength: 255
          example: billing@acme.test
        street:
          description: Fakturačná ulica klienta. Pri sparse override mení len snapshot na tomto doklade.
          type: [string, 'null']
          maxLength: 255
          example: Hlavná 1
        city:
          description: Fakturačné mesto klienta.
          type: [string, 'null']
          maxLength: 255
          example: Bratislava
        zip:
          description: Fakturačné PSČ klienta.
          type: [string, 'null']
          maxLength: 20
          example: '81101'
        countryId:
          type: [integer, 'null']
          description: "ID krajiny z [referenčnej tabuľky krajín](/reference-tables#krajiny)."
          example: 703
        hasDeliveryAddress:
          description: Voliteľný príznak dodacej adresy. Ak ho nepošlete, backend ho vie odvodiť z dodacích polí.
          type: boolean
          example: true
        deliveryStreet:
          description: Dodacia ulica klienta pre snapshot na tomto doklade.
          type: [string, 'null']
          maxLength: 255
          example: Skladová 5
        deliveryCity:
          description: Dodacie mesto klienta pre snapshot na tomto doklade.
          type: [string, 'null']
          maxLength: 255
          example: Trnava
        deliveryZip:
          description: Dodacie PSČ klienta pre snapshot na tomto doklade.
          type: [string, 'null']
          maxLength: 20
          example: '91701'
        deliveryCountryId:
          type: [integer, 'null']
          description: "ID krajiny dodacej adresy z [referenčnej tabuľky krajín](/reference-tables#krajiny)."
          example: 703
    InvoiceInput:
      description: >-
        Payload pre vytvorenie faktúry. V bežnom prípade stačí poslať `clientId` a `items`; ostatné polia môže backend dopočítať. Musíte poslať buď `clientId`, alebo objekt `client`.
      type: object
      required: [items]
      anyOf:
        - required: [clientId]
        - required: [client]
      properties:
        number:
          description: Manuálne číslo faktúry. Ak ho nepošlete, backend ho vygeneruje z číselného radu. Ak pošlete `number`, nepošlite zároveň `numericalSeriesId`.
          type: [string, 'null']
          minLength: 1
          maxLength: 20
          example: '20260001'
        proformaId:
          description: Voliteľné ID zálohovej faktúry, z ktorej sa faktúra vytvára.
          type: [integer, 'null']
          example: 401
        orderId:
          description: Voliteľné ID objednávky, z ktorej sa faktúra vytvára.
          type: [integer, 'null']
          example: 501
        quotationId:
          description: Voliteľné ID cenovej ponuky, z ktorej sa faktúra vytvára.
          type: [integer, 'null']
          example: 601
        clientId:
          description: ID existujúceho klienta. Toto je odporúčaný spôsob tvorby faktúry. Ak zároveň pošlete objekt `client`, použije sa ako sparse override snapshotu klienta pre tento konkrétny doklad.
          type: [integer, 'null']
          example: 101
        client:
          description: Sparse klientský payload. Ak pošlete `clientId`, slúži ako override snapshotu pre tento doklad. Ak `clientId` nepošlete, backend podľa týchto údajov klienta dopáruje alebo vytvorí.
          anyOf:
            - $ref: '#/components/schemas/InvoiceClientInput'
            - type: 'null'
        businessCaseId:
          description: Voliteľné ID obchodného prípadu. Ak ho pošlete, musí patriť klientovi určenému cez finálny `clientId`.
          type: [integer, 'null']
          example: 701
        numericalSeriesId:
          description: ID číselného radu. Ak ho nepošlete a nepošlete ani `number`, použije sa primárny číselný rad pre faktúry. Ak pošlete `numericalSeriesId`, nepošlite zároveň manuálne `number`.
          type: [integer, 'null']
          example: 12
        bankAccountId:
          description: ID bankového účtu, ktorý sa má použiť na faktúre. Ak ho nepošlete, použije sa primárny bankový účet firmy. Ak firma nemá nastavený žiadny primárny bankový účet, endpoint vráti `422` validačnú chybu s chybou pri `bankAccountId`.
          type: integer
          example: 201
        issueDate:
          description: Dátum vystavenia vo formáte `Y-m-d`. Musí byť po `2009-01-01` a pred dátumom o jeden rok v budúcnosti. Ak ho nepošlete, použije sa dnešný dátum.
          type: string
          format: date
          example: '2026-03-03'
        dueDateDays:
          description: Počet dní splatnosti. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: integer
          minimum: 0
          maximum: 1000
          example: 14
        deliveryDate:
          description: Dátum dodania vo formáte `Y-m-d`. Ak ho pošlete, musí byť menší alebo rovný `issueDate`. Ak ho nepošlete, použije sa `issueDate`.
          type: string
          format: date
          example: '2026-03-03'
        variableSymbol:
          description: Variabilný symbol. Povolené sú hodnoty s dĺžkou 1 až 10 číslic. Ak ho nepošlete, backend ho odvodí z finálneho čísla faktúry.
          type: integer
          minimum: 0
          maximum: 9999999999
          example: 20260001
        constantSymbol:
          description: Konštantný symbol. Povolené sú hodnoty s dĺžkou 1 až 4 číslic. Priorita je payload → klientská predvolená hodnota → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999
          example: 308
        specificSymbol:
          description: Špecifický symbol. Povolené sú hodnoty s dĺžkou 1 až 10 číslic. Priorita je payload → klientská predvolená hodnota → `null`.
          type: [integer, 'null']
          minimum: 0
          maximum: 9999999999
          example: 55
        discountType:
          description: Typ zľavy na úrovni celého dokladu.
          type: [string, 'null']
          enum: [percentage, fixed]
          example: percentage
        discountValue:
          description: Hodnota zľavy na úrovni celého dokladu.
          type: [number, 'null']
          format: float
          minimum: 0
          example: 10.0
        transferTaxLiability:
          description: Príznak prenesenej daňovej povinnosti. Ak ho nepošlete, použije sa `false`.
          type: boolean
          example: false
        deliveryMethodId:
          type: integer
          description: "ID spôsobu dodania z [referenčnej tabuľky spôsobov dodania](/reference-tables#sposoby-dodania). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        paymentMethodId:
          type: integer
          description: "ID spôsobu úhrady z [referenčnej tabuľky spôsobov úhrady](/reference-tables#sposoby-uhrady). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        currencyId:
          type: integer
          description: "ID meny z [referenčnej tabuľky mien](/reference-tables#meny). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        currencyRate:
          description: Kurz meny k EUR. Ak ho nepošlete, backend ho vyrieši server-side podľa `currencyId` a `deliveryDate`. Ak je finálna mena dokladu `EUR`, backend vždy uloží a vráti `1.0`.
          type: number
          format: float
          minimum: 0.00001
          maximum: 10000000
          example: 1.0
        languageId:
          type: integer
          description: "ID jazyka z [referenčnej tabuľky jazykov](/reference-tables#jazyky). Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy."
          example: 1
        qrTypeId:
          type: integer
          description: "ID QR typu z [referenčnej tabuľky QR typov](/reference-tables#qr-typy). Ak ho nepošlete, použije sa nastavenia dokladov firmy."
          example: 1
        note:
          description: Poznámka na doklade. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Ďakujeme za objednávku.
        textAboveItems:
          description: Text nad položkami. Priorita je payload → klientská predvolená hodnota → nastavenia dokladov firmy.
          type: [string, 'null']
          maxLength: 3000
          example: Dakujeme za spoluprácu.
        items:
          description: Položky faktúry. Toto pole je povinné aj vtedy, keď väčšinu ostatných hodnôt necháte dopočítať backendom.
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/InvoiceItemInput'
    CreditNoteInput:
