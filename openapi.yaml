      description: Jedna príloha naviazaná na CRM udalosť.
      type: object
      properties:
        id:
          description: Interné ID prílohy kontaktnej aktivity.
          type: integer
          example: 9001
        name:
          description: Pôvodný názov súboru.
          type: string
          example: note.pdf
        mimeType:
          description: MIME type prílohy.
          type: string
          example: application/pdf
        url:
          description: Priama URL adresa prílohy, ak je dostupná.
          type: string
          example: https://cdn.fintoro.sk/contact-activity-attachments/note.pdf
    RelatedDocument:
      description: Live naviazaný doklad vyrátaný backendom z `relatedEntity`.
      type: object
      properties:
        documentType:
          description: Typ naviazaného dokladu.
          type: string
          enum: [invoice, proforma, order, quotation, credit-note, received-invoice, received-receipt, warehouse-inbound-receipt, warehouse-outbound-receipt]
          example: invoice
        documentId:
          description: ID naviazaného dokladu.
          type: integer
          example: 301
        name:
          description: Ľudsky čitateľný názov dokladu.
          type: string
          example: Faktúra 20260001
        number:
          description: Číslo dokladu.
          type: string
          example: '20260001'
        issueDate:
          description: Dátum vystavenia dokladu, ak je dostupný.
          type: string
          example: '2026-03-10'
        totalWithVat:
          description: Aktuálna live suma dokladu s DPH, ak je dostupná.
          type: [number, 'null']
          format: float
          example: 121.0
        currency:
          description: Aktuálna mena dokladu, ak je dostupná.
          anyOf:
            - $ref: '#/components/schemas/Currency'
            - type: 'null'
    ContactActivityLogMetadata:
      description: >-
        Response metadata CRM udalosti prispôsobené pre Fintoro API. Pri dokladových typoch obsahujú live
        naviazaný doklad priamo v `relatedDocument` a pri snapshot sumách aj snapshot menu v
        `documentCurrencySnapshot`.
      type: object
      properties:
        content:
          description: Text poznámky, e-mailu alebo súhrn telefonátu uložený v CRM udalosti. Dostupné iba pre response typy `note`, `email` a `phone_call`.
          type: [string, 'null']
          example: Follow-up call summary
        email:
          description: E-mailová adresa použitá pri CRM udalosti. Dostupné iba pre response typ `email`.
          type: [string, 'null']
          format: email
          example: crm@example.test
        personName:
          description: Meno osoby, s ktorou prebehol telefonát. Dostupné iba pre response typ `phone_call`.
          type: [string, 'null']
          example: John Caller
        phoneNumber:
          description: Telefónne číslo osoby, ak bolo zadané. Dostupné iba pre response typ `phone_call`.
          type: [string, 'null']
          example: '+421900000000'
        documentNumberSnapshot:
          description: Snapshot čísla dokladu uložený pri lifecycle eventoch `document_created`, `document_updated` a `document_deleted`.
          type: [string, 'null']
          example: '20260001'
        documentPriceSnapshot:
          description: Snapshot sumy s DPH uložený pri lifecycle eventoch `document_created` a `document_updated`.
          type: [number, 'null']
          format: float
          example: 121.0
        documentCurrencySnapshot:
          description: Snapshot meny použitej pri snapshot sumách v metadata payload-e. Dostupné pri lifecycle eventoch, ktoré vracajú snapshot sumu alebo snapshot úhradu.
          anyOf:
            - $ref: '#/components/schemas/Currency'
            - type: 'null'
        paidAmount:
          description: Výška pridanej úhrady uložená pri evente `document_payment_added`.
          type: [number, 'null']
          format: float
          example: 25.5
        relatedDocument:
          description: Naviazaný doklad. Dostupné iba pre typy `document_linked`, `document_created`, `document_updated`, `document_deleted` a `document_payment_added`. `null`, ak naviazaný doklad už neexistuje.
          anyOf:
            - $ref: '#/components/schemas/RelatedDocument'
            - type: 'null'
    ContactActivityLog:
      description: Unified CRM udalosť.
      type: object
      properties:
        id:
          description: Interné ID CRM udalosti.
          type: integer
          example: 551
        type:
          description: Typ CRM udalosti.
          type: string
          enum: [note, email, phone_call, document_linked, document_created, document_updated, document_deleted, document_payment_added]
          example: note
        metadata:
          description: Metadata CRM udalosti pripravené pre Fintoro API response.
          $ref: '#/components/schemas/ContactActivityLogMetadata'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ContactActivityLogAttachment'
        businessCaseId:
          description: ID obchodného prípadu, ak je aktivita naviazaná na obchodný prípad.
          type: [integer, 'null']
          example: 501
        clientId:
          description: ID klienta, ak je aktivita naviazaná priamo na klienta mimo obchodného prípadu.
          type: [integer, 'null']
          example: 101
        supplierId:
          description: ID dodávateľa, ak je aktivita naviazaná priamo na dodávateľa mimo obchodného prípadu.
          type: [integer, 'null']
          example: 151
        createdAt:
          description: Dátum a čas vytvorenia CRM udalosti.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:00:00+01:00'
        updatedAt:
          description: Dátum a čas poslednej úpravy CRM udalosti.
          type: [string, 'null']
          format: date-time
          example: '2026-03-10T10:30:00+01:00'
    ContactActivityLogCreateInput:
      description: >-
        Payload pre vytvorenie CRM udalosti. Musíte poslať presne jedno z `businessCaseId`, `clientId`, `supplierId`,
        plus `type` a `metadata`. Voliteľné `attachmentUploadTokens[]` očakávajú tokeny z endpointu `contact-activity-attachments`.
        Pri `document_linked` type sa attachmenty nepodporujú.
      type: object
      required: [type, metadata]
      properties:
        businessCaseId:
          type: [integer, 'null']
          example: 501
        clientId:
          type: [integer, 'null']
          example: 101
        supplierId:
          type: [integer, 'null']
          example: 151
        type:
          type: string
          enum: [note, email, phone_call, document_linked]
          example: note
        metadata:
          description: Variabilný payload podľa `type`. Do requestu neposielajte snapshot polia ani `relatedDocument`; tie backend vypočíta alebo uloží sám.
          type: object
          properties:
            content:
              description: Text poznámky, tela e-mailu alebo súhrnu telefonátu. Dostupné iba pre payload typy `note`, `email` a `phone_call`. Povinné, ak je `type` jeden z týchto troch.
              type: [string, 'null']
              example: Follow-up call summary
            email:
              description: E-mailová adresa príjemcu alebo odosielateľa. Dostupné iba pre payload typ `email`. Povinné, ak je `type=email`.
              type: [string, 'null']
              format: email
              example: crm@example.test
            personName:
              description: Meno osoby, s ktorou prebehol telefonát. Dostupné iba pre payload typ `phone_call`. Povinné, ak je `type=phone_call`.
              type: [string, 'null']
              example: John Caller
            phoneNumber:
              description: Telefónne číslo osoby. Dostupné iba pre payload typ `phone_call`. Pole je voliteľné.
              type: [string, 'null']
              example: '+421900000000'
            documentType:
              description: Typ dokladu, ktorý sa má naviazať. Dostupné iba pre payload typ `document_linked`. Povinné, ak je `type=document_linked`.
              type: [string, 'null']
              enum: [invoice, proforma, order, quotation, credit-note]
              example: invoice
            documentId:
              description: ID dokladu, ktorý sa má naviazať. Dostupné iba pre payload typ `document_linked`. Povinné, ak je `type=document_linked`.
              type: [integer, 'null']
              example: 301
        attachmentUploadTokens:
          type: array
          items:
            type: string
          example:
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0xIn0=
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0yIn0=
    ContactActivityLogUpdateInput:
      description: >-
        Payload pre aktualizáciu CRM udalosti. Meniteľné sú iba `metadata`, voliteľné nové `attachmentUploadTokens[]`
        a `deletedAttachmentIds[]`. Polia `type`, `businessCaseId`, `clientId` a `supplierId` sú pri update zakázané.
      type: object
      required: [metadata]
      properties:
        metadata:
          description: Variabilný payload podľa typu existujúcej CRM udalosti. Do requestu neposielajte snapshot polia ani `relatedDocument`; tie backend vypočíta alebo uloží sám.
          type: object
          properties:
            content:
              description: Text poznámky, tela e-mailu alebo súhrnu telefonátu. Dostupné iba pre existujúce typy `note`, `email` a `phone_call`. Povinné, ak je existujúci typ jeden z týchto troch.
              type: [string, 'null']
              example: Follow-up call summary
            email:
              description: E-mailová adresa príjemcu alebo odosielateľa. Dostupné iba pre existujúci typ `email`. Povinné, ak je existujúci typ `email`.
              type: [string, 'null']
              format: email
              example: crm@example.test
            personName:
              description: Meno osoby, s ktorou prebehol telefonát. Dostupné iba pre existujúci typ `phone_call`. Povinné, ak je existujúci typ `phone_call`.
              type: [string, 'null']
              example: John Caller
            phoneNumber:
              description: Telefónne číslo osoby. Dostupné iba pre existujúci typ `phone_call`. Pole je voliteľné.
              type: [string, 'null']
              example: '+421900000000'
            documentType:
              description: Typ naviazaného dokladu. Dostupné iba pre existujúci typ `document_linked`. Povinné, ak je existujúci typ `document_linked`.
              type: [string, 'null']
              enum: [invoice, proforma, order, quotation, credit-note]
              example: invoice
            documentId:
              description: ID naviazaného dokladu. Dostupné iba pre existujúci typ `document_linked`. Povinné, ak je existujúci typ `document_linked`.
              type: [integer, 'null']
              example: 301
        attachmentUploadTokens:
          type: array
          items:
            type: string
          example:
            - eyJpdiI6Ik9wYXF1ZS1Ub2tlbi0xIn0=
        deletedAttachmentIds:
          type: array
          items:
            type: integer
          example: [9001]
    BankAccount:
      description: Bankový účet. Objekt spája business údaje účtu, informáciu o banke a stav napojenia na open banking.
      type: object
      properties:
        id:
          description: Interné ID bankového účtu vo Fintoro.
          type: integer
          example: 201
        bankId:
          description: "ID banky z [lookup endpointu bánk](#operation/listBanks). Ak je `null`, účet nie je naviazaný na konkrétnu banku z lookupu."
          type: [integer, 'null']
          example: 1
        bank:
          description: Vnorený objekt banky zodpovedajúci `bankId`, ak je banka známa a stále dostupná v lookup datasete.
          anyOf:
            - $ref: '#/components/schemas/Bank'
            - type: 'null'
        isPrimary:
          description: Označuje, či je tento účet aktuálne vedený ako primárny bankový účet firmy.
          type: boolean
          example: true
        autoPaymentMatching:
          description: Označuje, či je účet aktuálne napojený na automatické párovanie platieb cez open banking. Hodnota je odvodená od existencie open banking napojenia, neposiela sa v requeste.
          type: boolean
          example: true
        name:
          description: Používateľský názov bankového účtu zobrazený vo Fintoro.
          type: string
          example: Hlavný účet
        iban:
          description: IBAN bankového účtu.
          type: string
          example: SK3111000000001234567890
        swift:
          description: SWIFT alebo BIC kód bankového účtu.
          type: string
          example: TATRSKBX
        autoPairingStrategy:
          description: Stratégia automatického párovania platieb pre tento účet.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          example: by_variable_symbol
        balance:
          description: Posledný známy zostatok účtu, ak je dostupný z open banking napojenia.
          type: [number, 'null']
          format: float
          example: 1234.56
        lastSyncedAt:
          description: Dátum a čas poslednej úspešnej synchronizácie účtu cez open banking, ak je dostupný.
          type: [string, 'null']
          example: '2026-03-01 10:15:16'
        openBankingValidUntil:
          description: Dátum, do ktorého je platný aktuálny open banking súhlas, ak existuje.
          type: [string, 'null']
          format: date
          example: '2026-04-30'
        createdAt:
          description: Dátum a čas vytvorenia bankového účtu.
          type: [string, 'null']
          example: '2026-03-03 12:00:00'
        updatedAt:
          description: Dátum a čas poslednej zmeny bankového účtu.
          type: [string, 'null']
          example: '2026-03-03 15:45:00'
    Whoami:
      description: Minimálna identita firmy, v kontexte ktorej bearer token vykonáva requesty.
      type: object
      required: [name]
      properties:
        name:
          description: Obchodné meno firmy priradenej k aktuálnemu bearer tokenu.
          type: string
          example: Acme s.r.o.
    Bank:
      description: Banka dostupná v lookup endpointoch Fintoro API. Ide o stabilný lookup dataset, v ktorom sa existujúce ID bánk nemenia ani neprepisujú.
      type: object
      properties:
        id:
          description: Stabilné ID banky používané vo Fintoro. Po doplnení nových bánk sa existujúce ID nemenia ani neprepisujú.
          type: integer
          example: 23
        name:
          description: Názov banky.
          type: string
          example: Tatra Banka
        swift:
          description: SWIFT kód banky, ak je dostupný.
          type: string
          example: TATRSKBX
    BankAccountCreateInput:
      description: Payload pre vytvorenie bankového účtu. Posielate iba business dáta účtu. Polia, ktoré nepošlete a majú backendový default, sa dopočítajú na strane servera.
      type: object
      required: [name, iban, swift]
      properties:
        bankId:
          description: "Voliteľné ID banky z [lookup endpointu bánk](#operation/listBanks). Použite ho, ak chcete účet naviazať na konkrétnu banku z verejného lookupu."
          type: [integer, 'null']
          example: 1
        name:
          description: Názov bankového účtu, pod ktorým ho budete identifikovať vo Fintoro.
          type: string
          maxLength: 255
          example: Hlavný účet
        iban:
          description: IBAN bankového účtu. Musí byť validný a unikátny.
          type: string
          example: SK3111000000001234567890
        swift:
          description: SWIFT alebo BIC kód bankového účtu.
          type: string
          maxLength: 255
          example: TATRSKBX
        autoPairingStrategy:
          description: Stratégia automatického párovania platieb pre tento účet. Ak pole nepošlete, použije sa predvolená hodnota `by_variable_symbol`.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          default: by_variable_symbol
          example: by_variable_symbol
    BankAccountUpdateInput:
      description: Payload pre aktualizáciu bankového účtu. Pošlite len polia, ktoré chcete zmeniť. Polia, ktoré vynecháte, zostanú bez zmeny.
      type: object
      properties:
        bankId:
          description: "Voliteľné ID banky z [lookup endpointu bánk](#operation/listBanks). Pošlite `null`, ak chcete väzbu na banku odstrániť."
          type: [integer, 'null']
          example: 1
        name:
          description: Nový názov bankového účtu.
          type: string
          maxLength: 255
          example: Hlavný účet
        iban:
          description: Nový IBAN bankového účtu. Musí zostať validný a unikátny.
          type: string
          example: SK3111000000001234567890
        swift:
          description: Nový SWIFT alebo BIC kód bankového účtu.
          type: string
          maxLength: 255
          example: TATRSKBX
        autoPairingStrategy:
          description: Nová stratégia automatického párovania platieb pre tento účet. Ak pole vynecháte, zostane zachovaná existujúca hodnota.
          type: string
          enum:
            - none
            - by_variable_symbol
            - by_price
            - by_variable_symbol_and_price
            - by_all_symbols
            - by_all_symbols_and_price
          example: by_price
        isPrimary:
          description: Pošlite `true`, ak chcete účet nastaviť ako primárny účet firmy. Ak pole vynecháte alebo pošlete `false`, aktuálne priradenie primárneho účtu zostane bez zmeny a účet sa touto operáciou neprepne na neprimárny.
          type: boolean
          example: true
    Warehouse:
      description: Sklad vrátane inbound a outbound číselného radu.
      type: object
      properties:
        id:
          description: Interné ID skladu vo Fintoro.
          type: integer
          example: 301
        name:
          description: Názov skladu zobrazený vo Fintoro.
          type: string
          example: Hlavný sklad
        code:
          description: Interný kód skladu. Musí byť unikátny.
          type: string
          example: MAIN-WH
        inboundNumericalSeriesPattern:
          description: Vzor číselného radu pre skladové príjemky tohto skladu.
          type: string
          example: PRI-(RR)-(CCCC)
        inboundNumericalSeriesNextNumber:
          description: Ďalšie poradové číslo, ktoré sa použije pri automatickom generovaní skladovej príjemky.
          type: integer
          example: 12
        outboundNumericalSeriesPattern:
          description: Vzor číselného radu pre skladové výdajky tohto skladu.
          type: string
          example: VYD-(RR)-(CCCC)
        outboundNumericalSeriesNextNumber:
          description: Ďalšie poradové číslo, ktoré sa použije pri automatickom generovaní skladovej výdajky.
          type: integer
          example: 8
    WarehouseCreateInput:
      description: Payload pre vytvorenie skladu. Všetky business polia sú povinné.
      type: object
      required:
        - name
        - code
        - inboundNumericalSeriesPattern
        - inboundNumericalSeriesNextNumber
        - outboundNumericalSeriesPattern
        - outboundNumericalSeriesNextNumber
      properties:
        name:
          description: Názov skladu.
          type: string
          maxLength: 255
          example: Hlavný sklad
        code:
          description: Interný kód skladu. Musí byť unikátny.
          type: string
          maxLength: 255
          example: MAIN-WH
        inboundNumericalSeriesPattern:
          description: Vzor číselného radu pre skladové príjemky. Musí obsahovať counter token.
          type: string
          maxLength: 255
          example: PRI-(RR)-(CCCC)
        inboundNumericalSeriesNextNumber:
          description: Ďalšie poradové číslo pre inbound rad. Minimálna hodnota je `1`.
          type: integer
          minimum: 1
          example: 1
        outboundNumericalSeriesPattern:
          description: Vzor číselného radu pre skladové výdajky. Musí obsahovať counter token.
          type: string
          maxLength: 255
          example: VYD-(RR)-(CCCC)
        outboundNumericalSeriesNextNumber:
          description: Ďalšie poradové číslo pre outbound rad. Minimálna hodnota je `1`.
          type: integer
          minimum: 1
          example: 1
    WarehouseUpdateInput:
      description: Payload pre aktualizáciu skladu. Fintoro API používa plný `PUT` kontrakt, preto sú required všetky business polia rovnako ako pri create.
